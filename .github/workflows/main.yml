name: Dashboard Data Auto Update

on:
  schedule:
    # 한국 시간 기준 월~금 오전 9시, 오후 2시, 오후 5시 실행
    # 09:00 KST = 00:00 UTC
    # 14:00 KST = 05:00 UTC
    # 17:00 KST = 08:00 UTC
    - cron: '0 0,5,8 * * 1-5'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: 리포지토리 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집 및 엑셀 변환 실행
        env:
          WOS_ID: ${{ secrets.WOS_ID }}
          WOS_PW: ${{ secrets.WOS_PW }}
        run: python main.py

      - name: 변경사항 깃허브에 커밋 및 푸시
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "매일 자동 업데이트: 진짜 엑셀(.xlsx)로 변환 완료"
          file_pattern: 'current_sales.xlsx'
