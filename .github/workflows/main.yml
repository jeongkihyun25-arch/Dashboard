name: Dashboard Data Auto Update

on:
  schedule:
    # 한국 시간(KST) 오전 9시는 UTC 00:00입니다.
    - cron: '0 0 * * *' 
  workflow_dispatch: 

# [추가] 봇에게 리포지토리에 파일을 쓸 수 있는 권한을 줍니다.
permissions:
  contents: write

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: 리포지토리 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 엑셀 데이터 수집 스크립트 실행
        env:
          WOS_ID: ${{ secrets.WOS_ID }}
          WOS_PW: ${{ secrets.WOS_PW }}
        run: python main.py

      - name: 변경사항 깃허브에 커밋 및 푸시
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "매일 아침 자동 업데이트: current_sales.xls"
          # [수정] main.py에서 생성하는 파일명과 똑같이 .xls로 맞춥니다.
          file_pattern: 'current_sales.xls'
