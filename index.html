<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSTK LT WG 실적 관리 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; background-color: #f8fafc; }
        .bstk-red { color: #E30613; }
        .bg-bstk-red { background-color: #E30613; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04); }
        .filter-btn { transition: all 0.2s ease; }
        .filter-active { background-color: #1e293b; color: white; }
        .filter-inactive { background-color: white; color: #64748b; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="text-slate-900 antialiased overflow-x-hidden">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-bstk-red text-white font-black px-3 py-1 rounded-lg text-sm italic shadow-md">BSTK</div>
                <h1 class="text-lg font-black text-slate-800 tracking-tight">LT WG 실적 확인</h1>
            </div>
            <div id="status" class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full border border-emerald-100 uppercase italic">Strict Filter Active</div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        
        <div class="bg-white p-5 rounded-[2rem] card-shadow border border-slate-100 mb-8 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">규격 선택</span>
                <div class="flex gap-1.5">
                    <button onclick="setFilter('size', 'ALL')" id="sz-ALL" class="filter-btn filter-active px-5 py-2 rounded-xl text-xs font-bold">전체</button>
                    <button onclick="setFilter('size', '205')" id="sz-205" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-xs font-bold">205</button>
                    <button onclick="setFilter('size', '215')" id="sz-215" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-xs font-bold">215</button>
                    <button onclick="setFilter('size', '225')" id="sz-225" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-xs font-bold">225</button>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">패턴 선택</span>
                <div class="flex gap-1.5">
                    <button onclick="setFilter('pattern', 'ALL')" id="pt-ALL" class="filter-btn filter-active px-5 py-2 rounded-xl text-xs font-bold">전체</button>
                    <button onclick="setFilter('pattern', 'RS002')" id="pt-RS002" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-xs font-bold">RS002</button>
                    <button onclick="setFilter('pattern', 'RD002')" id="pt-RD002" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-xs font-bold">RD002</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100">
                <p class="text-[11px] font-bold text-slate-400 uppercase mb-3 italic">2026 누적 실적 (YTD)</p>
                <div class="flex items-baseline gap-2 mb-2">
                    <span id="ytd-val" class="text-6xl font-black tracking-tighter">0</span>
                    <span class="text-slate-300 font-bold text-xl">본</span>
                </div>
                <p class="text-[10px] text-slate-400 font-bold italic">* 경영계획 제외 / LSR2 & 17.5down 합계</p>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100 border-t-4 border-t-red-500">
                <p id="month-label" class="text-[11px] font-bold text-slate-400 uppercase mb-3 italic">당월 실적</p>
                <div class="flex items-baseline gap-2 bstk-red">
                    <span id="month-val" class="text-6xl font-black tracking-tighter">0</span>
                    <span class="text-slate-300 font-bold text-xl">본</span>
                </div>
            </div>

            <div class="bg-slate-900 p-8 rounded-[2.5rem] card-shadow text-white relative">
                <p class="text-[11px] font-bold text-slate-500 uppercase mb-3">5년 평균 누적 도달률</p>
                <div id="attainment-pct" class="text-6xl font-black tracking-tighter mb-4">0%</div>
                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden mb-4">
                    <div id="attainment-bar" class="bg-emerald-400 h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p class="text-[10px] text-slate-300 italic">
                    <span class="text-white font-bold underline decoration-red-500 underline-offset-4">비교 기준:</span> RS/RD는 신제품이므로, 과거의 모든 동일 사이즈 제품(R156 등) 전체 실적의 5년 평균 페이스와 비교합니다.
                </p>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] card-shadow border border-slate-100 overflow-hidden">
            <div class="px-8 py-6 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <h3 class="font-black text-slate-800 italic">딜러별 판매추이</h3>
                    <span class="px-2 py-0.5 bg-blue-50 text-blue-600 rounded text-[9px] font-black uppercase border border-blue-100 animate-pulse">딜러명 클릭 시 상세 전개</span>
                </div>
                <span class="text-[10px] font-bold text-slate-400 uppercase">정렬: 누적 판매량 순</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left whitespace-nowrap min-w-[800px]">
                    <thead>
                        <tr class="bg-white text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                            <th class="px-10 py-5">딜러명 (클릭 시 상세)</th>
                            <th class="px-8 py-5 text-right">당월 판매</th>
                            <th class="px-8 py-5 text-right bg-slate-50/30 text-slate-900 font-black">2026 누계</th>
                            <th class="px-8 py-5 text-right font-black">5년 평균비</th>
                        </tr>
                    </thead>
                    <tbody id="dealer-list" class="divide-y divide-slate-50 text-sm font-bold"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const GITHUB_USER = "jeongkihyun25-arch";
        const REPO_NAME = "Dashboard";
        const t = new Date().getTime();
        const URL_HIST = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/historical_data.xlsx?t=${t}`;
        const URL_CURR = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/current_sales.xls?t=${t}`;

        let rawCurrent = [], rawHistory = [], filterSize = 'ALL', filterPattern = 'ALL', currentMonthNum = 1;

        // **사진 근거 정밀 필터링 로직**
        const isStrictLSR = (row, h) => {
            const mtpIdx = h.findIndex(v => v.includes('MTP분류'));
            const deptIdx = h.findIndex(v => v.includes('이익부서'));
            const sizeIdx = h.findIndex(v => v.includes('SIZE') || v.includes('사이즈'));
            
            const mtp = String(row[mtpIdx] || '').trim();
            const dept = String(row[deptIdx] || '').trim();
            const size = String(row[sizeIdx] || '').replace(/[^0-9]/g, '');

            // 1. MTP분류: 사진 필터 리스트와 100% 일치 확인
            const isTargetMTP = (mtp === 'LSR2' || mtp === 'TBR T/L 17.5 down');
            // 2. 이익부서: 경영계획 무조건 배제
            const isNotPlan = dept !== '경영계획';
            // 3. 규격: 17.5인치 트럭 규격 (205, 215, 225)
            const isCorrectSize = size.startsWith('20575175') || size.startsWith('21575175') || size.startsWith('22575175');
            
            return isTargetMTP && isNotPlan && isCorrectSize;
        };

        const matchFilterSize = (s, fs) => fs === 'ALL' || String(s).includes(fs);
        const matchPattern = (p, fp) => {
            if(fp === 'ALL') return true;
            const up = String(p).toUpperCase();
            return fp === 'RS002' ? (up.includes('RS002') || up.includes('STEER')) : (up.includes('RD002') || up.includes('DRIVE'));
        };

        async function fetchRaw(url) {
            const res = await fetch(url);
            const ab = await res.arrayBuffer();
            const wb = XLSX.read(new Uint8Array(ab), {type: 'array'});
            return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
        }

        async function init() {
            currentMonthNum = new Date().getMonth() + 1;
            document.getElementById('month-label').innerText = `당월 실적 (${currentMonthNum}월)`;
            try {
                const [hRows, cRows] = await Promise.all([fetchRaw(URL_HIST), fetchRaw(URL_CURR)]);
                rawCurrent = processExcel(cRows, 'current');
                rawHistory = processExcel(hRows, 'history');
                render();
            } catch (e) { console.error(e); }
        }

        function processExcel(rows, type) {
            const result = [];
            if(rows.length < 2) return result;
            const h = rows[0].map(v => String(v||'').toUpperCase().replace(/\s/g, ''));
            const idxD = h.findIndex(v => v.includes('거래처'));
            const idxS = h.findIndex(v => v.includes('SIZE') || v.includes('사이즈'));
            const idxP = h.findIndex(v => v.includes('PTTN') || v.includes('패턴'));
            
            if(type === 'current') {
                const idxY = h.findIndex(v => v.includes('합계수량'));
                let idxM = -1;
                for(let i=h.length-1; i>=0; i--) { if(h[i].includes('QTY')){ idxM = i; break; } }
                
                for(let i=1; i<rows.length; i++) {
                    const r = rows[i];
                    if(!r || !isStrictLSR(r, h)) continue;
                    const yVal = Math.max(0, parseFloat(String(r[idxY]||0).replace(/,/g,'')) || 0);
                    const mVal = Math.max(0, parseFloat(String(r[idxM]||0).replace(/,/g,'')) || 0);
                    if(yVal > 0) result.push({ d: String(r[idxD]||'기타').trim(), s: r[idxS], p: r[idxP], y: yVal, m: mVal });
                }
            } else {
                const idxA = h.findIndex(v => v.includes('5년평균'));
                for(let i=1; i<rows.length; i++) {
                    const r = rows[i];
                    const size = String(r[idxS]||'').replace(/[^0-9]/g, '');
                    if(!r || !(size.startsWith('20575175') || size.startsWith('21575175') || size.startsWith('22575175'))) continue;
                    result.push({ d: String(r[idxD]||'기타').trim(), s: r[idxS], p: r[idxP], a: parseFloat(r[idxA]||0) });
                }
            }
            return result;
        }

        window.setFilter = function(t, v) {
            if(t === 'size') filterSize = v; else filterPattern = v;
            ['sz-ALL','sz-205','sz-215','sz-225','pt-ALL','pt-RS002','pt-RD002'].forEach(id => {
                const btn = document.getElementById(id);
                if(btn) btn.className = id.includes(v) ? 'filter-btn filter-active px-5 py-2 rounded-xl text-xs font-bold' : 'filter-btn filter-inactive px-5 py-2 rounded-xl text-xs font-bold';
            });
            render();
        }

        function toggleRow(id) { document.getElementById(id).classList.toggle('hidden'); }

        function render() {
            const cur = rawCurrent.filter(r => matchFilterSize(r.s, filterSize) && matchPattern(r.p, filterPattern));
            const his = rawHistory.filter(r => matchFilterSize(r.s, filterSize)); 

            let sY = 0, sM = 0, sA = 0;
            const dMap = {};

            cur.forEach(r => {
                sY += r.y; sM += r.m;
                if(!dMap[r.d]) dMap[r.d] = { y:0, m:0, a:0, details:[] };
                dMap[r.d].y += r.y; dMap[r.d].m += r.m;
                dMap[r.d].details.push(r);
            });

            his.forEach(r => {
                const tA = (r.a/12)*currentMonthNum;
                sA += tA;
                if(dMap[r.d]) { dMap[r.d].a += tA; }
            });

            document.getElementById('ytd-val').innerText = sY.toLocaleString();
            document.getElementById('month-val').innerText = sM.toLocaleString();
            const pct = sA > 0 ? Math.round((sY/sA)*100) : 0;
            document.getElementById('attainment-pct').innerText = pct + "%";
            document.getElementById('attainment-bar').style.width = Math.min(pct, 100) + "%";

            const tbody = document.getElementById('dealer-list');
            tbody.innerHTML = '';
            Object.entries(dMap).sort((a,b) => b[1].y - a[1].y).forEach(([n, d], idx) => {
                const dPct = d.a > 0 ? Math.round((d.y/d.a)*100) : 0;
                const detailId = `detail-${idx}`;
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 cursor-pointer" onclick="toggleRow('${detailId}')">
                        <td class="px-10 py-5 text-slate-700 font-bold flex items-center gap-2"><span class="text-blue-500 bg-blue-50 rounded w-4 h-4 flex items-center justify-center text-[10px]">+</span> ${n}</td>
                        <td class="px-8 py-5 text-right text-slate-400 font-medium">${d.m.toLocaleString()}</td>
                        <td class="px-8 py-5 text-right bg-slate-50/30 bstk-red font-black text-base">${d.y.toLocaleString()}</td>
                        <td class="px-8 py-5 text-right font-black ${dPct >= 100 ? 'text-emerald-600' : 'text-slate-500'}">${dPct}%</td>
                    </tr>
                    <tr id="${detailId}" class="hidden bg-slate-50/50">
                        <td colspan="4" class="px-10 py-4"><div class="bg-white rounded-xl border border-slate-200 p-4 shadow-sm"><table class="w-full text-xs text-left"><thead><tr class="text-slate-400 border-b border-slate-100"><th class="pb-2">규격 & 패턴</th><th class="pb-2 text-right">누적 판매</th></tr></thead><tbody class="divide-y divide-slate-50">${d.details.map(det => `<tr><td class="py-2"><strong>${det.s}</strong> <span class="text-slate-400">${det.p}</span></td><td class="py-2 text-right bstk-red font-bold">${det.y.toLocaleString()}</td></tr>`).join('')}</tbody></table></div></td></tr>`;
            });
        }
        window.onload = init;
    </script>
</body>
</html>
