<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSTK 17.5" LSR 모니터링</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; background-color: #f8fafc; }
        .bstk-red { color: #E30613; }
        .bg-bstk-red { background-color: #E30613; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04); }
        .truncate-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body class="text-slate-900 antialiased">

    <header class="sticky top-0 z-50 bg-white border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-bstk-red text-white font-black px-3 py-1 rounded-lg text-sm italic shadow-md">BSTK</div>
                <h1 class="text-xl font-black text-slate-800 tracking-tight">17.5" LSR 실적 대시보드</h1>
            </div>
            <div id="status-container" class="flex flex-col items-end">
                <div class="flex items-center gap-2">
                    <span id="status-dot" class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></span>
                    <span id="status-text" class="text-[10px] font-bold text-slate-500 uppercase">System Initializing...</span>
                </div>
                <div id="log-text" class="text-[9px] text-slate-400 mt-1 font-mono"></div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
            <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100">
                <p class="text-[11px] font-bold text-slate-400 uppercase mb-3">2026 누적 실적 (YTD)</p>
                <div class="flex items-baseline gap-2 mb-6">
                    <span id="ytd-val" class="text-6xl font-black tracking-tighter">0</span>
                    <span class="text-slate-300 font-bold text-xl">본</span>
                </div>
                <div class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-lg w-fit">17.5" 규격 전용 추출</div>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100 border-t-4 border-t-red-500">
                <p id="month-label" class="text-[11px] font-bold text-slate-400 uppercase mb-3">당월 실적</p>
                <div class="flex items-baseline gap-2 mb-6 bstk-red">
                    <span id="month-val" class="text-6xl font-black tracking-tighter">0</span>
                    <span class="text-slate-300 font-bold text-xl">본</span>
                </div>
                <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                    <div id="month-bar" class="bg-bstk-red h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>

            <div class="bg-slate-900 p-8 rounded-[2.5rem] card-shadow text-white relative">
                <p class="text-[11px] font-bold text-slate-500 uppercase mb-3">5년 평균 누적 도달률</p>
                <div id="attainment-pct" class="text-6xl font-black tracking-tighter mb-4">0%</div>
                <div class="w-full bg-slate-800 h-2.5 rounded-full overflow-hidden">
                    <div id="attainment-bar" class="bg-white h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p id="attainment-msg" class="text-[10px] font-bold text-slate-400 mt-4 text-right italic uppercase tracking-widest">vs Historical Avg</p>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] card-shadow border border-slate-100 overflow-hidden">
            <div class="px-10 py-8 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center">
                <h3 class="font-black text-slate-800 text-lg">대리점별 실적 분석 랭킹</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left whitespace-nowrap">
                    <thead>
                        <tr class="bg-white text-[11px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                            <th class="px-10 py-6">대리점명</th>
                            <th class="px-10 py-6 text-right">당월 실적</th>
                            <th class="px-10 py-6 text-right bg-slate-50/50 text-slate-900 font-black">2026 누적 (YTD)</th>
                            <th class="px-10 py-6 text-right">도달률(%)</th>
                        </tr>
                    </thead>
                    <tbody id="dealer-list" class="divide-y divide-slate-50 text-sm font-bold"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const GITHUB_USER = "jeongkihyun25-arch";
        const REPO_NAME = "Dashboard";
        const t = new Date().getTime(); // 캐시 무시 강제 접속
        const URL_HIST = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/historical_data.xlsx?t=${t}`;
        const URL_CURR = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/current_sales.xls?t=${t}`;

        function addLog(msg) {
            console.log(msg);
            const logEl = document.getElementById('log-text');
            if(logEl) logEl.innerText = msg;
        }

        async function fetchRaw(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error("파일 다운로드 실패 (주소를 확인하세요)");
            const ab = await res.arrayBuffer();
            const wb = XLSX.read(new Uint8Array(ab), {type: 'array'});
            // 핵심기술: 열 이름을 무시하고 배열(칸 번호) 방식으로 읽어서 ERP 오류 원천 차단
            return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
        }

        async function init() {
            try {
                const nowMonth = new Date().getMonth() + 1;
                document.getElementById('month-label').innerText = `당월 실적 (${nowMonth}월)`;
                
                addLog("깃허브 데이터 로드 중...");
                const [hRows, cRows] = await Promise.all([fetchRaw(URL_HIST), fetchRaw(URL_CURR)]);
                addLog("데이터 분석 연산 중...");

                // 1. 현재 실적 엑셀에서 필요한 '칸 번호(Index)' 찾기
                const cHeaders = cRows[0];
                const cIdxDealer = cHeaders.findIndex(h => h && String(h).includes('거래처'));
                const cIdxSize = cHeaders.findIndex(h => h && (String(h).toUpperCase().includes('SIZE') || String(h).includes('사이즈')));
                const cIdxYTD = cHeaders.findIndex(h => h && (String(h).includes('합계수량') || String(h).includes('누적수량')));
                
                // 당월 수량(가장 마지막에 있는 QTY 열의 칸 번호) 찾기
                let cIdxMonth = -1;
                for(let i = cHeaders.length - 1; i >= 0; i--) {
                    if (cHeaders[i] && String(cHeaders[i]).toUpperCase().includes('QTY')) {
                        cIdxMonth = i;
                        break;
                    }
                }

                if (cIdxDealer === -1 || cIdxSize === -1 || cIdxYTD === -1) {
                    throw new Error("엑셀에서 필수 항목(거래처/SIZE/합계수량)을 못 찾았습니다.");
                }

                // 2. 과거 엑셀에서 필요한 '칸 번호' 찾기
                const hHeaders = hRows[0];
                const hIdxDealer = hHeaders.findIndex(h => h && String(h).includes('거래처'));
                const hIdxAvg = hHeaders.findIndex(h => h && String(h).includes('5년평균'));

                let totalYTD = 0, totalMonth = 0, totalAvgYTD = 0;
                const dealers = {};

                // 3. 현재 실적 긁어오기 (17.5인치 필터)
                for (let i = 1; i < cRows.length; i++) {
                    const row = cRows[i];
                    if (!row || row.length === 0) continue;

                    const sizeStr = String(row[cIdxSize] || '');
                    // 17.5인치 판단
                    if (sizeStr.replace(/[^0-9]/g, '').includes('175')) {
                        const name = String(row[cIdxDealer] || '기타').trim();
                        // 콤마 제거 후 숫자 변환 (안전장치)
                        const ytd = parseFloat(String(row[cIdxYTD]).replace(/,/g, '')) || 0;
                        const mQty = parseFloat(String(row[cIdxMonth]).replace(/,/g, '')) || 0;

                        totalYTD += ytd;
                        totalMonth += mQty;

                        if (!dealers[name]) dealers[name] = { ytd: 0, m: 0, hAvg: 0 };
                        dealers[name].ytd += ytd;
                        dealers[name].m += mQty;
                    }
                }

                // 4. 5년 평균 매칭
                for (let i = 1; i < hRows.length; i++) {
                    const row = hRows[i];
                    if (!row || row.length === 0) continue;

                    const name = String(row[hIdxDealer] || '').trim();
                    if (dealers[name]) {
                        // 현재 월 기준 기대치 환산 (예: 4월이면 평균의 4/12)
                        const avgYTD = (parseFloat(String(row[hIdxAvg]).replace(/,/g, '')) || 0) / 12 * nowMonth;
                        dealers[name].hAvg += avgYTD;
                        totalAvgYTD += avgYTD;
                    }
                }

                // 5. 화면 업데이트
                document.getElementById('ytd-val').innerText = totalYTD.toLocaleString();
                document.getElementById('month-val').innerText = totalMonth.toLocaleString();
                document.getElementById('month-bar').style.width = (totalYTD > 0 ? Math.min((totalMonth / (totalYTD/nowMonth) * 100), 100) : 0) + "%";

                const attPct = totalAvgYTD > 0 ? Math.round((totalYTD / totalAvgYTD) * 100) : 0;
                document.getElementById('attainment-pct').innerText = attPct + "%";
                document.getElementById('attainment-bar').style.width = Math.min(attPct, 100) + "%";

                const list = document.getElementById('dealer-list');
                Object.entries(dealers).sort((a,b) => b[1].ytd - a[1].ytd).forEach(([name, d]) => {
                    const pct = d.hAvg > 0 ? Math.round((d.ytd / d.hAvg) * 100) : 0;
                    list.innerHTML += `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-10 py-6 font-bold text-slate-700 truncate-text" style="max-width:250px;">${name}</td>
                            <td class="px-10 py-6 text-right text-slate-400">${d.m.toLocaleString()}</td>
                            <td class="px-10 py-6 text-right bg-slate-50/30 text-bstk-red font-black text-base">${d.ytd.toLocaleString()}</td>
                            <td class="px-10 py-6 text-right font-black ${pct >= 100 ? 'text-emerald-600' : 'text-slate-400'}">${pct}%</td>
                        </tr>`;
                });

                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-emerald-500";
                document.getElementById('status-text').innerText = "Live Connected";
                addLog("분석 완료!");

            } catch (e) {
                console.error(e);
                document.getElementById('status-text').innerText = "Sync Error";
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-red-500";
                addLog(e.message);
            }
        }
        window.onload = init;
    </script>
</body>
</html>
