<script>
const GITHUB_USER = "jeongkihyun25-arch";
const REPO_NAME = "Dashboard";

const URL_CURR = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/current_sales.xls`;
const URL_HIST = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/historical_data.xlsx`;

let rawCurrent = [];
let rawHistory = [];

let filterSize = 'ALL';
let filterPattern = 'ALL';

let selectedMonth = 1;
let availableMonths = [];

// 🔥 숫자 안전 변환
const num = v => parseFloat(String(v||'0').replace(/,/g,'')) || 0;


// ================== LOAD ==================
async function loadData(){

    // 🔥 CURRENT
    try {
        const res = await fetch(URL_CURR + "?t=" + Date.now());
        if(!res.ok) throw new Error("current 실패");

        const ab = await res.arrayBuffer();
        const wb = XLSX.read(new Uint8Array(ab), {type:'array'});

        rawCurrent = processCurrent(wb.Sheets[wb.SheetNames[0]]);

    } catch(e){
        console.error(e);
        alert("❌ current_sales 로드 실패");
        return;
    }

    // 🔥 HISTORY (실패 허용)
    try {
        const res = await fetch(URL_HIST + "?t=" + Date.now());

        if(res.ok){
            const ab = await res.arrayBuffer();
            const wb = XLSX.read(new Uint8Array(ab), {type:'array'});
            rawHistory = processHistory(wb.Sheets[wb.SheetNames[0]]);
        } else {
            rawHistory = [];
        }

    } catch(e){
        console.warn("history 실패 (무시)");
        rawHistory = [];
    }

    // 🔥 최신월 자동
    if(rawCurrent.length){
        const months = Object.keys(rawCurrent[0].monthly).map(Number);
        selectedMonth = Math.max(...months);
    }

    initMonthSelector();
    render();
}


// ================== CURRENT ==================
function processCurrent(sheet){

    const rows = XLSX.utils.sheet_to_json(sheet,{header:1});
    const h = rows[0].map(v=>String(v||'').trim());

    const idxD = h.findIndex(v=>v.includes('거래처')||v.includes('딜러'));
    const idxS = h.findIndex(v=>v.includes('SIZE')||v.includes('사이즈'));
    const idxP = h.findIndex(v=>v.includes('PTTN')||v.includes('패턴'));

    // 🔥 월 컬럼 탐색 (핵심)
    const monthCols = {};

    h.forEach((v,i)=>{
        const txt = String(v).replace(/\s+/g,'');

        const match = txt.match(/2026[-\/]?(\d{1,2})/);

        if(match){
            const m = parseInt(match[1]);

            if(
                txt.includes('QTY') ||
                txt.includes('수량') ||
                txt.includes('판매')
            ){
                monthCols[m] = i;
            }
        }
    });

    availableMonths = Object.keys(monthCols).map(Number).sort((a,b)=>a-b);

    const result = [];

    for(let i=1;i<rows.length;i++){
        const r = rows[i];
        if(!r) continue;

        const size = String(r[idxS]||'');
        if(size.includes('235')) continue;

        let y = 0;
        const monthly = {};

        availableMonths.forEach(m=>{
            let val = num(r[monthCols[m]]);

            // 🔥 마이너스 제거
            if(val < 0) val = 0;

            monthly[m] = val;
            y += val;
        });

        if(y <= 0) continue;

        result.push({
            d: String(r[idxD]||'기타').trim(),
            s: size,
            p: String(r[idxP]||''),
            y,
            monthly
        });
    }

    return result;
}


// ================== HISTORY ==================
function processHistory(sheet){

    const rows = XLSX.utils.sheet_to_json(sheet,{header:1});
    const h = rows[0];

    const idxSize = h.findIndex(v=>String(v).includes('사이즈'));
    const idxAvg = h.findIndex(v=>String(v).includes('5년'));

    return rows.slice(1).map(r=>({
        d: String(r[0]||''),
        a: num(r[idxAvg])
    })).filter(r=>!String(r[idxSize]).includes('235'));
}


// ================== MONTH ==================
function initMonthSelector(){
    const sel = document.getElementById('month-select');
    sel.innerHTML='';

    availableMonths.forEach(m=>{
        const o=document.createElement('option');
        o.value=m;
        o.textContent=m+'월';
        if(m===selectedMonth) o.selected=true;
        sel.appendChild(o);
    });
}

window.changeMonth = function(){
    selectedMonth = parseInt(document.getElementById('month-select').value);
    render();
};


// ================== RENDER ==================
function render(){

    const cur = rawCurrent.filter(r=>
        (filterSize==='ALL'||r.s.includes(filterSize)) &&
        (filterPattern==='ALL'||
         (filterPattern==='RS002' && r.p.toUpperCase().includes('STEER'))||
         (filterPattern==='RD002' && r.p.toUpperCase().includes('DRIVE')))
    );

    let totalYTD=0,totalMonth=0,total5yr=0;

    const dealerMap={};

    cur.forEach(r=>{
        const m = r.monthly[selectedMonth]||0;

        totalYTD += r.y;
        totalMonth += m;

        if(!dealerMap[r.d]) dealerMap[r.d]={y:0,m:0,a:0,details:[]};

        dealerMap[r.d].y+=r.y;
        dealerMap[r.d].m+=m;
        dealerMap[r.d].details.push({...r,m});
    });

    rawHistory.forEach(r=>{
        total5yr += r.a;
        if(dealerMap[r.d]) dealerMap[r.d].a+=r.a;
    });

    document.getElementById('ytd-val').innerText = Math.round(totalYTD).toLocaleString();
    document.getElementById('month-val').innerText = Math.round(totalMonth).toLocaleString();
    document.getElementById('cum-month').innerText = selectedMonth;
    document.getElementById('month-label').innerText = `${selectedMonth}월 실적`;

    const pct = total5yr>0 ? Math.round(totalYTD/total5yr*100) : 0;
    document.getElementById('attainment-pct').innerText = pct+"%";

    document.getElementById('row-count').innerText =
        `딜러 ${Object.keys(dealerMap).length} / 누계 ${Math.round(totalYTD).toLocaleString()}`;

    const tbody = document.getElementById('dealer-list');
    tbody.innerHTML='';

    Object.entries(dealerMap)
    .sort((a,b)=>b[1].y - a[1].y)
    .forEach(([name,d],idx)=>{

        const id=`detail-${idx}`;

        tbody.innerHTML+=`
        <tr onclick="toggleRow('${id}')" class="hover:bg-slate-50 cursor-pointer">
            <td class="px-8 py-5 font-semibold">${name}</td>
            <td class="px-8 py-5 text-right">${Math.round(d.m).toLocaleString()}</td>
            <td class="px-8 py-5 text-right font-black bstk-red">${Math.round(d.y).toLocaleString()}</td>
            <td class="px-8 py-5 text-right">${d.a?Math.round(d.y/d.a*100):0}%</td>
        </tr>

        <tr id="${id}" class="hidden bg-slate-50">
        <td colspan="4" class="px-8 py-4">
        <div class="bg-white border rounded-2xl p-5 text-xs">
        <table class="w-full">
        <thead><tr class="text-slate-400">
        <th>규격</th><th>패턴</th><th class="text-right">누계</th>
        </tr></thead>
        <tbody>
        ${d.details.map(x=>`
        <tr>
        <td>${x.s}</td>
        <td>${x.p}</td>
        <td class="text-right bstk-red">${Math.round(x.y).toLocaleString()}</td>
        </tr>`).join('')}
        </tbody></table>
        </div></td></tr>`;
    });
}


// ==================
window.onload = loadData;
</script>
