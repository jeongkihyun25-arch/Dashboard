<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSTK Sales Analytics System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; background-color: #f8fafc; }
        .bstk-red { color: #E30613; }
        .bg-bstk-red { background-color: #E30613; }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }
        .type-active { background-color: #1e293b; color: white; }
        .type-inactive { background-color: white; color: #64748b; border: 1px solid #e2e8f0; }
        th.sortable { cursor: pointer; position: relative; }
        th.sortable:hover { background-color: #f1f5f9; }
        .loading-overlay { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <div id="loader" class="loading-overlay">
        <div class="w-12 h-12 border-4 border-slate-200 border-t-red-600 rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-slate-500">데이터를 동기화 중입니다...</p>
    </div>

    <header class="sticky top-0 z-50 glass-header">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-bstk-red text-white font-black px-3 py-1.5 rounded-lg text-xs italic">BSTK SALES</div>
                <div class="flex bg-slate-100 p-1 rounded-xl">
                    <button onclick="changeType('ALL')" id="type-ALL" class="type-active px-4 py-1.5 rounded-lg text-xs font-bold">전체</button>
                    <button onclick="changeType('PSR')" id="type-PSR" class="type-inactive px-4 py-1.5 rounded-lg text-xs font-bold transition-all">PCR</button>
                    <button onclick="changeType('TBR')" id="type-TBR" class="type-inactive px-4 py-1.5 rounded-lg text-xs font-bold transition-all">TBR</button>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <select id="mtp-select" onchange="render()" class="border border-slate-200 rounded-xl px-3 py-2 text-xs font-bold bg-white shadow-sm outline-none"></select>
                <select id="month-select" onchange="render()" class="border border-slate-200 rounded-xl px-3 py-2 text-xs font-bold bg-white shadow-sm outline-none"></select>
            </div>
        </div>
    </header>

    <main id="main-content" class="max-w-7xl mx-auto px-4 py-6 hidden">
        
        <div class="flex justify-between items-end mb-6">
            <div>
                <span class="text-[10px] font-black text-red-500 uppercase tracking-widest">Real-time Dashboard</span>
                <h2 class="text-2xl font-black text-slate-900 mt-1">통합 판매 실적 현황</h2>
            </div>
            <div id="update-time" class="text-[10px] font-bold text-slate-400 bg-slate-100 px-3 py-1.5 rounded-full">데이터 확인 중...</div>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-6 rounded-3xl card-shadow border border-slate-50">
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-tight">올해 누적 (YTD)</p>
                <div class="flex items-baseline gap-1 mt-2">
                    <span id="ytd-val" class="text-4xl font-black text-slate-900">0</span>
                    <span class="text-slate-400 font-bold text-sm">본</span>
                </div>
                <div id="ytd-yoy-badge" class="mt-3 inline-block px-2.5 py-1 rounded-lg text-[10px] font-black">대기중</div>
            </div>

            <div class="bg-white p-6 rounded-3xl card-shadow border border-slate-50">
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-tight">작년 동기 누적</p>
                <div class="flex items-baseline gap-1 mt-2">
                    <span id="ly-ytd-val" class="text-4xl font-black text-slate-300">0</span>
                    <span class="text-slate-300 font-bold text-sm">본</span>
                </div>
                <p class="text-[9px] text-slate-400 mt-3 font-medium">* 5년 월별 비중 보정치</p>
            </div>

            <div class="bg-slate-900 p-6 rounded-3xl card-shadow text-white relative overflow-hidden">
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-tight">동기 도달률</p>
                <div id="attainment-ytd-pct" class="text-4xl font-black text-emerald-400 mt-2">0%</div>
                <div class="w-full bg-slate-800 h-1.5 rounded-full mt-4 overflow-hidden">
                    <div id="attainment-ytd-bar" class="bg-emerald-400 h-full w-0 transition-all duration-1000"></div>
                </div>
                <p class="text-[9px] text-slate-500 mt-3">5년 평균 누적(<span id="target-ytd-val">0</span>) 대비</p>
            </div>

            <div class="bg-white p-6 rounded-3xl card-shadow border border-slate-50 relative">
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-tight">연간 총 달성률</p>
                <div id="attainment-total-pct" class="text-4xl font-black text-indigo-600 mt-2">0%</div>
                <div class="w-full bg-slate-100 h-1.5 rounded-full mt-4 overflow-hidden">
                    <div id="attainment-total-bar" class="bg-indigo-600 h-full w-0 transition-all duration-1000"></div>
                </div>
                <p class="text-[9px] text-slate-400 mt-3">5년 평균 연간(<span id="target-total-val">0</span>) 대비</p>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] card-shadow border border-slate-100 overflow-hidden">
            <div class="px-8 py-6 border-b border-slate-50 flex flex-col md:flex-row justify-between items-center gap-4">
                <h3 class="font-black text-slate-800 text-lg flex items-center gap-2">
                    거래처별 상세 실적
                    <span id="row-count" class="text-[10px] font-bold bg-slate-100 text-slate-500 px-2 py-1 rounded">0 DEALERS</span>
                </h3>
                <input id="search-input" oninput="render()" type="text" placeholder="대리점명 또는 사이즈 검색..." class="w-full md:w-72 border border-slate-100 rounded-2xl px-5 py-2.5 text-sm font-bold bg-slate-50 outline-none focus:bg-white focus:ring-2 focus:ring-slate-200 transition-all">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left whitespace-nowrap">
                    <thead>
                        <tr class="bg-slate-50/50 text-[10px] font-black text-slate-400 uppercase border-b border-slate-100">
                            <th class="px-8 py-4 sticky left-0 bg-slate-50/50 z-10">거래처명</th>
                            <th class="sortable px-4 py-4 text-right" onclick="setSort('ly_ytd')">작년 동기 누적 <span id="sort-icon-ly_ytd"></span></th>
                            <th class="sortable px-4 py-4 text-right bg-red-50/30 text-red-600" onclick="setSort('ytd')">올해 누적(YTD) <span id="sort-icon-ytd">▼</span></th>
                            <th class="sortable px-4 py-4 text-right" onclick="setSort('atot')">5년 평균(연) <span id="sort-icon-atot"></span></th>
                            <th class="sortable px-4 py-4 text-right" onclick="setSort('aytd')">5년 평균(누적) <span id="sort-icon-aytd"></span></th>
                            <th class="px-8 py-4 text-center">동기 도달률</th>
                        </tr>
                    </thead>
                    <tbody id="dealer-list" class="divide-y divide-slate-50 text-sm font-bold"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // 사용자 정보 설정
        const GITHUB_USER = "jeongkihyun25-arch";
        const REPO_NAME = "sales";
        let fullData = [], currentType = 'ALL', selectedMonth = new Date().getMonth() + 1;
        let sortCol = 'ytd', sortDesc = true;

        async function init() {
            const t = new Date().getTime();
            // 💡 로봇이 생성하는 current_sales.xlsx를 불러옵니다.
            const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/current_sales.xlsx?t=${t}`;
            
            try {
                const res = await fetch(url);
                const ab = await res.arrayBuffer();
                const wb = XLSX.read(new Uint8Array(ab), {type: 'array'});
                processData(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1}));
                
                const now = new Date();
                document.getElementById('update-time').innerText = `최종 업데이트: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden');
            } catch (e) {
                alert("실적 데이터(current_sales.xlsx)를 불러올 수 없습니다. Actions 로그를 확인해 주세요.");
                console.error(e);
            }
        }

        function processData(rows) {
            if (!rows || rows.length < 1) return;
            const h = rows[0].map(v => String(v || '').trim());
            
            // historical_data.xlsx 컬럼 구조와 일치시킴
            const idx = {
                dealer: h.indexOf('거래처명'), 
                type: h.indexOf('품목분류'), 
                mtp: h.indexOf('MTP분류'),
                y25: h.indexOf('2025년'), 
                y26: h.indexOf('2026년(당해)'), 
                atot: h.indexOf('5년평균(연간)')
            };
            
            const mIdx = {}; 
            for(let m=1; m<=12; m++) mIdx[m] = h.indexOf(`${m}월(5년평균)`);

            fullData = rows.slice(1).filter(r => r[idx.dealer]).map(r => {
                const mAvg = {}; 
                for(let m=1; m<=12; m++) mAvg[m] = Math.max(0, parseFloat(r[mIdx[m]]) || 0);
                
                return {
                    dealer: String(r[idx.dealer]), 
                    type: String(r[idx.type]), 
                    mtp: String(r[idx.mtp]),
                    ytd: Math.max(0, parseFloat(r[idx.y26]) || 0), 
                    ly_total: Math.max(0, parseFloat(r[idx.y25]) || 0),
                    atot: Math.max(0, parseFloat(r[idx.atot]) || 0), 
                    mAvg: mAvg
                };
            });

            // 필터 초기화
            const mtps = [...new Set(fullData.map(d => d.mtp))].sort();
            document.getElementById('mtp-select').innerHTML = '<option value="ALL">전체 MTP</option>' + mtps.map(m => `<option value="${m}">${m}</option>`).join('');
            document.getElementById('month-select').innerHTML = Array.from({length:12}, (_,i)=> `<option value="${i+1}" ${i+1===selectedMonth?'selected':''}>${i+1}월 마감 기준</option>`).join('');
            render();
        }

        function changeType(t) {
            currentType = t;
            ['ALL', 'PSR', 'TBR'].forEach(id => document.getElementById('type-'+id).className = id===t?'type-active px-4 py-1.5 rounded-lg text-xs font-bold shadow-sm':'type-inactive px-4 py-1.5 rounded-lg text-xs font-bold');
            render();
        }

        function setSort(col) {
            if (sortCol === col) sortDesc = !sortDesc;
            else { sortCol = col; sortDesc = true; }
            render();
        }

        function render() {
            selectedMonth = parseInt(document.getElementById('month-select').value);
            const selectedMtp = document.getElementById('mtp-select').value;
            const search = document.getElementById('search-input').value.toLowerCase();

            // 정렬 아이콘
            ['ly_ytd', 'ytd', 'atot', 'aytd'].forEach(c => {
                const el = document.getElementById(`sort-icon-${c}`);
                if(el) el.innerText = sortCol === c ? (sortDesc ? '▼' : '▲') : '';
            });

            let filtered = fullData;
            if (currentType !== 'ALL') filtered = filtered.filter(d => d.type === currentType);
            if (selectedMtp !== 'ALL') filtered = filtered.filter(d => d.mtp === selectedMtp);

            // 데이터 집계
            const dMap = {};
            filtered.forEach(r => {
                if(!dMap[r.dealer]) dMap[r.dealer] = { ytd:0, ly_ytd:0, atot:0, aytd:0 };
                dMap[r.dealer].ytd += r.ytd;
                dMap[r.dealer].atot += r.atot;
                
                let ytdW = 0, fullW = 0;
                for(let m=1; m<=12; m++) {
                    fullW += r.mAvg[m];
                    if(m <= selectedMonth) { ytdW += r.mAvg[m]; dMap[r.dealer].aytd += r.mAvg[m]; }
                }
                const ratio = (fullW > 0) ? (ytdW / fullW) : (selectedMonth / 12);
                dMap[r.dealer].ly_ytd += (r.ly_total * ratio);
            });

            let T = { ytd:0, ly_ytd:0, aytd:0, atot:0 };
            Object.values(dMap).forEach(v => { T.ytd += v.ytd; T.ly_ytd += v.ly_ytd; T.aytd += v.aytd; T.atot += v.atot; });

            // 상단 카드 업데이트
            document.getElementById('ytd-val').innerText = Math.ceil(T.ytd).toLocaleString();
            document.getElementById('ly-ytd-val').innerText = Math.ceil(T.ly_ytd).toLocaleString();
            
            const yoy = T.ly_ytd > 0 ? Math.ceil(((T.ytd / T.ly_ytd) - 1) * 100) : 0;
            const badge = document.getElementById('ytd-yoy-badge');
            badge.innerText = `전년비 ${yoy}% ${yoy >= 0 ? '▲' : '▼'}`;
            badge.className = `mt-3 inline-block px-2.5 py-1 rounded-lg text-[10px] font-black ${yoy>=0?'bg-emerald-50 text-emerald-600':'bg-red-50 text-red-600'}`;

            document.getElementById('attainment-ytd-pct').innerText = (T.aytd > 0 ? Math.ceil((T.ytd/T.aytd)*100) : 0) + "%";
            document.getElementById('attainment-ytd-bar').style.width = Math.min(100, (T.aytd > 0 ? (T.ytd/T.aytd)*100 : 0)) + "%";
            document.getElementById('target-ytd-val').innerText = Math.ceil(T.aytd).toLocaleString();

            document.getElementById('attainment-total-pct').innerText = (T.atot > 0 ? Math.ceil((T.ytd/T.atot)*100) : 0) + "%";
            document.getElementById('attainment-total-bar').style.width = Math.min(100, (T.atot > 0 ? (T.ytd/T.atot)*100 : 0)) + "%";
            document.getElementById('target-total-val').innerText = Math.ceil(T.atot).toLocaleString();

            // 리스트 렌더링
            const entries = Object.entries(dMap)
                .filter(([n]) => n.toLowerCase().includes(search))
                .sort((a,b) => sortDesc ? b[1][sortCol] - a[1][sortCol] : a[1][sortCol] - b[1][sortCol]);

            document.getElementById('row-count').innerText = entries.length + " DEALERS";
            document.getElementById('dealer-list').innerHTML = entries.map(([n, d]) => {
                const py = d.aytd > 0 ? Math.ceil((d.ytd/d.aytd)*100) : 0;
                const yoyDeal = d.ly_ytd > 0 ? Math.ceil(((d.ytd/d.ly_ytd)-1)*100) : 0;
                return `<tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="px-8 py-4 sticky left-0 bg-white font-black text-slate-700 shadow-[2px_0_10px_rgba(0,0,0,0.02)]">${n}</td>
                    <td class="px-4 py-4 text-right text-slate-400">${Math.ceil(d.ly_ytd).toLocaleString()}</td>
                    <td class="px-4 py-4 text-right bg-red-50/10">
                        <span class="bstk-red font-black">${Math.ceil(d.ytd).toLocaleString()}</span>
                        <span class="text-[9px] ml-1 ${yoyDeal>=0?'text-emerald-500':'text-red-500'}">(${yoyDeal>=0?'+':''}${yoyDeal}%)</span>
                    </td>
                    <td class="px-4 py-4 text-right text-slate-500">${Math.ceil(d.atot).toLocaleString()}</td>
                    <td class="px-4 py-4 text-right text-slate-500">${Math.ceil(d.aytd).toLocaleString()}</td>
                    <td class="px-8 py-4 text-center">
                        <div class="flex items-center justify-center gap-2">
                            <div class="w-16 bg-slate-100 h-1.5 rounded-full overflow-hidden">
                                <div class="bg-emerald-500 h-full" style="width: ${Math.min(100, py)}%"></div>
                            </div>
                            <span class="text-[10px] font-black text-emerald-600 w-8 text-right">${py}%</span>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
