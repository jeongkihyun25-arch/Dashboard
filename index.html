<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSTK LT WG 실적 관리 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; background-color: #f8fafc; }
        .bstk-red { color: #E30613; }
        .bg-bstk-red { background-color: #E30613; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04); }
        .filter-btn { transition: all 0.2s ease; }
        .filter-active { background-color: #1e293b; color: white; }
        .filter-inactive { background-color: white; color: #64748b; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="text-slate-900 antialiased overflow-x-hidden">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-bstk-red text-white font-black px-3 py-1 rounded-lg text-sm italic shadow-md">BSTK</div>
                <h1 class="text-lg font-black text-slate-800 tracking-tight">LT WG 실적 확인</h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="row-count" class="text-[11px] font-bold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200 hidden md:block">데이터 로딩 중...</div>
                <select id="month-select" onchange="changeMonth()" class="border border-slate-300 rounded-xl px-4 py-1.5 text-sm font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-red-500">
                    </select>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        
        <div class="bg-white p-5 rounded-[2rem] card-shadow border border-slate-100 mb-8 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">규격 선택</span>
                <div class="flex gap-1.5">
                    <button onclick="setFilter('size', 'ALL')" id="sz-ALL" class="filter-btn filter-active px-5 py-2 rounded-xl text-xs font-bold">전체</button>
                    <button onclick="setFilter('size', '205')" id="sz-205" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-xs font-bold">205</button>
                    <button onclick="setFilter('size', '215')" id="sz-215" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-xs font-bold">215</button>
                    <button onclick="setFilter('size', '225')" id="sz-225" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-xs font-bold">225</button>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">패턴 필터</span>
                <div class="flex gap-1.5">
                    <button onclick="setFilter('pattern', 'ALL')" id="pt-ALL" class="filter-btn filter-active px-4 py-2 rounded-xl text-xs font-bold">전체</button>
                    <button onclick="setFilter('pattern', 'RS002')" id="pt-RS002" class="filter-btn filter-inactive px-4 py-2 rounded-xl text-xs font-bold">RS002</button>
                    <button onclick="setFilter('pattern', 'RD002')" id="pt-RD002" class="filter-btn filter-inactive px-4 py-2 rounded-xl text-xs font-bold">RD002</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100">
                <p class="text-[11px] font-bold text-slate-400 uppercase mb-3 italic">2026 누적 실적 (YTD)</p>
                <div class="flex items-baseline gap-2 mb-2">
                    <span id="ytd-val" class="text-6xl font-black tracking-tighter">0</span>
                    <span class="text-slate-300 font-bold text-xl">본</span>
                </div>
                <p class="text-[10px] text-slate-400 font-bold italic">* 경영계획 제외 및 반품(-수량) 제외</p>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100 border-t-4 border-t-red-500">
                <p id="month-label" class="text-[11px] font-bold text-slate-400 uppercase mb-3 italic">당월 실적</p>
                <div class="flex items-baseline gap-2 bstk-red">
                    <span id="month-val" class="text-6xl font-black tracking-tighter">0</span>
                    <span class="text-slate-300 font-bold text-xl">본</span>
                </div>
            </div>

            <div class="bg-slate-900 p-8 rounded-[2.5rem] card-shadow text-white relative">
                <p class="text-[11px] font-bold text-slate-500 uppercase mb-3">5년 평균 누적 도달률</p>
                <div id="attainment-pct" class="text-6xl font-black tracking-tighter mb-4">0%</div>
                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden mb-4">
                    <div id="attainment-bar" class="bg-emerald-400 h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p class="text-[10px] text-slate-400 italic">비교 기준: 현재 필터 실적 vs 과거 5년 동기 실적</p>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] card-shadow border border-slate-100 overflow-hidden">
            <div class="px-8 py-6 border-b border-slate-50 bg-slate-50/50 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                <div class="flex items-center gap-3">
                    <h3 class="font-black text-slate-800 italic">딜러별 판매추이</h3>
                    <span class="px-2 py-0.5 bg-blue-50 text-blue-600 rounded text-[9px] font-black uppercase border border-blue-100">딜러명 클릭 시 상세</span>
                </div>
                <div class="flex items-center gap-3">
                    <input id="search-input" placeholder="딜러명 검색..." onkeyup="filterTable()" class="border border-slate-200 rounded-xl px-4 py-2 text-xs font-bold text-slate-600 focus:outline-none focus:ring-2 focus:ring-red-500 bg-white w-full md:w-48">
                    <span class="text-[10px] font-bold text-slate-400 uppercase hidden md:inline">정렬: 누적 판매량 순</span>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left whitespace-nowrap min-w-[800px]">
                    <thead>
                        <tr class="bg-white text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                            <th class="px-10 py-5">딜러명 (클릭 시 상세)</th>
                            <th class="px-8 py-5 text-right">당월 판매</th>
                            <th class="px-8 py-5 text-right bg-slate-50/30 text-slate-900 font-black">2026 누계</th>
                            <th class="px-8 py-5 text-right font-black">5년 평균비</th>
                        </tr>
                    </thead>
                    <tbody id="dealer-list" class="divide-y divide-slate-50 text-sm font-bold"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const GITHUB_USER = "jeongkihyun25-arch";
        const REPO_NAME = "Dashboard";
        const t = new Date().getTime();
        const URL_HIST = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/historical_data.xlsx?t=${t}`;
        const URL_CURR = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/current_sales.xls?t=${t}`;

        let rawCurrent = [], rawHistory = [], filterSize = 'ALL', filterPattern = 'ALL', selectedMonth = new Date().getMonth() + 1;

        // **2,186개 정밀 타겟팅 로직 (마이너스 제외, 경영계획 제외, 235 제외)**
        const isStrictTarget = (row, header) => {
            const mtpIdx = header.findIndex(v => String(v || '').toUpperCase().includes('MTP분류'));
            const deptIdx = header.findIndex(v => String(v || '').includes('이익부서'));
            const sizeIdx = header.findIndex(v => String(v || '').toUpperCase().includes('SIZE') || String(v || '').includes('사이즈'));
            const qtyIdx = header.length - 1; // 엑셀 구조상 마지막이 총 합계수량

            if (mtpIdx === -1 || sizeIdx === -1) return false;

            const mtp = String(row[mtpIdx] || '').trim().toUpperCase();
            const size = String(row[sizeIdx] || '').trim();
            const qty = parseFloat(String(row[qtyIdx] || '0').replace(/,/g, '')) || 0;
            const dept = deptIdx !== -1 ? String(row[deptIdx] || '').trim() : '';

            if (size.includes('235')) return false; // 235 규격 제외
            if (qty <= 0) return false; // 마이너스(-) 및 0 수량 배제
            if (dept.includes('경영계획')) return false; // 가상 데이터 배제

            // LSR2 이거나 17.5DOWN, T/L, TBR 조합
            const isLSR2 = mtp === 'LSR2';
            const is17_5 = mtp.includes('17.5') && (mtp.includes('DOWN') || mtp.includes('T/L') || mtp.includes('TBR'));

            return isLSR2 || is17_5;
        };

        const matchPattern = (p, fp) => {
            if(fp === 'ALL') return true;
            const up = String(p).toUpperCase();
            return fp === 'RS002' ? (up.includes('RS002') || up.includes('STEER')) : (up.includes('RD002') || up.includes('DRIVE'));
        };

        async function init() {
            try {
                const [hRows, cRows] = await Promise.all([fetchRaw(URL_HIST), fetchRaw(URL_CURR)]);
                rawCurrent = processCurrent(cRows);
                rawHistory = processHistory(hRows);
                
                initMonthSelector();
                render();
            } catch (e) { console.error("데이터 로드 실패:", e); }
        }

        async function fetchRaw(url) {
            const res = await fetch(url);
            const ab = await res.arrayBuffer();
            const wb = XLSX.read(new Uint8Array(ab), {type: 'array'});
            return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
        }

        // 매달 열이 늘어나도 완벽히 인식하는 동적 추출 로직
        function processCurrent(rows) {
            if (rows.length < 2) return [];
            const h = rows[0].map(v => String(v || '').trim());
            const idxD = h.findIndex(v => v.includes('거래처'));
            const idxS = h.findIndex(v => v.toUpperCase().includes('SIZE') || v.includes('사이즈'));
            const idxP = h.findIndex(v => v.toUpperCase().includes('PTTN') || v.includes('패턴'));
            const idxYTD = h.length - 1; // 맨 끝 총계

            // 월별 QTY 열의 인덱스를 저장
            const monthlyIdx = {};
            for(let i=0; i<h.length; i++) {
                if (h[i].toUpperCase() === 'QTY') {
                    const prevCol = String(h[i-1] || '');
                    const match = prevCol.match(/2026-(\d{2})/);
                    if(match) monthlyIdx[parseInt(match[1], 10)] = i;
                }
            }

            const result = [];
            for (let i = 1; i < rows.length; i++) {
                const r = rows[i];
                if (!r || !isStrictTarget(r, h)) continue;

                const yVal = parseFloat(String(r[idxYTD] || '0').replace(/,/g, '')) || 0;
                
                // 각 월별 수량 추출
                const monthly = {};
                for(let m=1; m<=12; m++) {
                    if(monthlyIdx[m]) {
                        monthly[m] = parseFloat(String(r[monthlyIdx[m]] || '0').replace(/,/g, '')) || 0;
                    } else {
                        monthly[m] = 0;
                    }
                }

                result.push({ 
                    d: String(r[idxD] || '기타').trim(), 
                    s: String(r[idxS] || ''), 
                    p: String(r[idxP] || ''), 
                    y: yVal, 
                    monthly: monthly 
                });
            }
            return result;
        }

        function processHistory(rows) {
            if (rows.length < 2) return [];
            const h = rows[0].map(v => String(v || '').trim());
            const idxD = 0; // 거래처
            const idxS = h.findIndex(v => v.includes('사이즈'));
            const idxAvg = h.findIndex(v => v.includes('5년평균'));

            const result = [];
            for (let i = 1; i < rows.length; i++) {
                const r = rows[i];
                if (!r) continue;
                const size = String(r[idxS] || '');
                if (size.includes('235')) continue; // 235 제외
                result.push({ d: String(r[idxD] || '기타').trim(), s: size, a: parseFloat(r[idxAvg] || 0) || 0 });
            }
            return result;
        }

        function initMonthSelector() {
            const sel = document.getElementById('month-select');
            sel.innerHTML = '';
            // 현재 월까지만 옵션 생성 (데이터가 있는 곳까지)
            for (let m = 1; m <= selectedMonth; m++) {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = `${m}월`;
                if (m === selectedMonth) opt.selected = true;
                sel.appendChild(opt);
            }
        }

        window.changeMonth = function() {
            selectedMonth = parseInt(document.getElementById('month-select').value);
            render();
        };

        window.setFilter = function(type, v) {
            if (type === 'size') filterSize = v; else filterPattern = v;
            ['sz-ALL','sz-205','sz-215','sz-225','pt-ALL','pt-RS002','pt-RD002'].forEach(id => {
                const btn = document.getElementById(id);
                if(btn) btn.className = id.includes(v) || (v === 'ALL' && id.includes('ALL')) ? 'filter-btn filter-active px-5 py-2 rounded-xl text-xs font-bold' : 'filter-btn filter-inactive px-5 py-2 rounded-xl text-xs font-bold';
            });
            render();
        };

        function filterTable() {
            const term = document.getElementById('search-input').value.toLowerCase().trim();
            document.querySelectorAll('#dealer-list tr').forEach(tr => {
                if (tr.id && tr.id.startsWith('detail-')) return;
                tr.style.display = tr.textContent.toLowerCase().includes(term) ? '' : 'none';
            });
        }

        function toggleRow(id) { document.getElementById(id).classList.toggle('hidden'); }

        function render() {
            const cur = rawCurrent.filter(r => (filterSize === 'ALL' || r.s.includes(filterSize)) && matchPattern(r.p, filterPattern));
            const his = rawHistory.filter(r => (filterSize === 'ALL' || r.s.includes(filterSize))); 

            let sY = 0, sM = 0, sA = 0;
            const dMap = {};
            
            cur.forEach(r => {
                const mQty = Math.max(0, r.monthly[selectedMonth] || 0); // 당월 마이너스 제거
                sY += r.y; 
                sM += mQty;
                
                if(!dMap[r.d]) dMap[r.d] = { y:0, m:0, a:0, details:[] };
                dMap[r.d].y += r.y; 
                dMap[r.d].m += mQty;
                dMap[r.d].details.push({...r, m: mQty});
            });
            
            his.forEach(r => {
                const tA = (r.a/12)*selectedMonth;
                sA += tA;
                if(dMap[r.d]) dMap[r.d].a += tA;
            });

            document.getElementById('ytd-val').innerText = Math.round(sY).toLocaleString();
            document.getElementById('month-val').innerText = Math.round(sM).toLocaleString();
            document.getElementById('month-label').innerText = `${selectedMonth}월 실적`;
            document.getElementById('row-count').innerText = `필터 완료: ${cur.length}건 (베이스 2,186행)`;

            const pct = sA > 0 ? Math.round((sY/sA)*100) : 0;
            document.getElementById('attainment-pct').innerText = pct + "%";
            document.getElementById('attainment-bar').style.width = Math.min(pct, 100) + "%";

            const tbody = document.getElementById('dealer-list');
            tbody.innerHTML = '';
            
            Object.entries(dMap).sort((a,b) => b[1].y - a[1].y).forEach(([n, d], idx) => {
                const dPct = d.a > 0 ? Math.round((d.y/d.a)*100) : 0;
                const detailId = `detail-${idx}`;
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 cursor-pointer" onclick="toggleRow('${detailId}')">
                        <td class="px-10 py-5 text-slate-700 font-bold flex items-center gap-2"><span class="text-blue-500 bg-blue-50 rounded w-4 h-4 flex items-center justify-center text-[10px]">+</span> ${n}</td>
                        <td class="px-8 py-5 text-right text-slate-400 font-medium">${Math.round(d.m).toLocaleString()}</td>
                        <td class="px-8 py-5 text-right bg-slate-50/30 bstk-red font-black text-base">${Math.round(d.y).toLocaleString()}</td>
                        <td class="px-8 py-5 text-right font-black ${dPct >= 100 ? 'text-emerald-600' : 'text-slate-500'}">${dPct}%</td>
                    </tr>
                    <tr id="${detailId}" class="hidden bg-slate-50/50">
                        <td colspan="4" class="px-10 py-4"><div class="bg-white rounded-xl border border-slate-200 p-4 shadow-sm"><table class="w-full text-xs text-left"><thead><tr class="text-slate-400 border-b border-slate-100"><th class="pb-2">상세 규격 & 패턴</th><th class="pb-2 text-right">당월</th><th class="pb-2 text-right">누적 판매</th></tr></thead><tbody class="divide-y divide-slate-50">${d.details.map(det => `<tr><td class="py-2"><strong>${det.s}</strong> <span class="text-slate-400">${det.p}</span></td><td class="py-2 text-right">${Math.round(det.m).toLocaleString()}</td><td class="py-2 text-right bstk-red font-bold">${Math.round(det.y).toLocaleString()}</td></tr>`).join('')}</tbody></table></div></td></tr>`;
            });
        }
        window.onload = init;
    </script>
</body>
</html>
