<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSTK LT WG 실적 관리 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; background-color: #f8fafc; }
        .bstk-red { color: #E30613; }
        .bg-bstk-red { background-color: #E30613; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04); }
        .filter-btn { transition: all 0.2s ease; }
        .filter-active { background-color: #1e293b; color: white; }
        .filter-inactive { background-color: white; color: #64748b; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="text-slate-900 antialiased overflow-x-hidden">
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-bstk-red text-white font-black px-3 py-1 rounded-lg text-sm italic shadow-md">BSTK</div>
                <h1 class="text-lg font-black text-slate-800 tracking-tight">LT WG 실적 확인 (17.5인치)</h1>
            </div>
            <div id="status" class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full border border-emerald-100">
                Strict Mode: LSR2 + 17.5 Down Only
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <!-- 필터 영역 -->
        <div class="bg-white p-5 rounded-[2rem] card-shadow border border-slate-100 mb-8 flex flex-wrap gap-6 items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">규격 선택</span>
                <div class="flex gap-1.5">
                    <button onclick="setFilter('size', 'ALL')" id="sz-ALL" class="filter-btn filter-active px-5 py-2 rounded-xl text-xs font-bold">전체</button>
                    <button onclick="setFilter('size', '205')" id="sz-205" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-xs font-bold">205</button>
                    <button onclick="setFilter('size', '215')" id="sz-215" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-xs font-bold">215</button>
                    <button onclick="setFilter('size', '225')" id="sz-225" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-xs font-bold">225</button>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">패턴 필터</span>
                <div class="flex gap-1.5">
                    <button onclick="setFilter('pattern', 'ALL')" id="pt-ALL" class="filter-btn filter-active px-4 py-2 rounded-xl text-xs font-bold">전체</button>
                    <button onclick="setFilter('pattern', 'RS002')" id="pt-RS002" class="filter-btn filter-inactive px-4 py-2 rounded-xl text-xs font-bold">R-STEER (RS002)</button>
                    <button onclick="setFilter('pattern', 'RD002')" id="pt-RD002" class="filter-btn filter-inactive px-4 py-2 rounded-xl text-xs font-bold">R-DRIVE (RD002)</button>
                </div>
            </div>
        </div>

        <!-- 요약 카드 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100">
                <p class="text-[11px] font-bold text-slate-400 uppercase mb-3 italic">2026 누적 실적 (YTD)</p>
                <div class="flex items-baseline gap-2 mb-2">
                    <span id="ytd-val" class="text-6xl font-black tracking-tighter">0</span>
                    <span class="text-slate-300 font-bold text-xl">본</span>
                </div>
            </div>
            <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100 border-t-4 border-t-red-500">
                <p id="month-label" class="text-[11px] font-bold text-slate-400 uppercase mb-3 italic">당월 실적</p>
                <div class="flex items-baseline gap-2 bstk-red">
                    <span id="month-val" class="text-6xl font-black tracking-tighter">0</span>
                    <span class="text-slate-300 font-bold text-xl">본</span>
                </div>
            </div>
            <div class="bg-slate-900 p-8 rounded-[2.5rem] card-shadow text-white relative">
                <p class="text-[11px] font-bold text-slate-500 uppercase mb-3">5년 평균 대비 도달률</p>
                <div id="attainment-pct" class="text-6xl font-black tracking-tighter mb-4">0%</div>
                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden mb-4">
                    <div id="attainment-bar" class="bg-emerald-400 h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p class="text-[10px] text-slate-300 italic">※ 2026년 현재까지 vs 과거 5년 동일 기간 평균</p>
            </div>
        </div>

        <!-- 딜러별 테이블 -->
        <div class="bg-white rounded-[2.5rem] card-shadow border border-slate-100 overflow-hidden">
            <div class="px-8 py-6 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center">
                <h3 class="font-black text-slate-800 italic">딜러별 판매 추이</h3>
                <span class="text-[10px] font-bold text-slate-400 uppercase">정렬: 2026 누계 판매량 순</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left whitespace-nowrap min-w-[900px]">
                    <thead>
                        <tr class="bg-white text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                            <th class="px-10 py-5">딜러명 (클릭 시 상세 보기)</th>
                            <th class="px-8 py-5 text-right">당월 판매</th>
                            <th class="px-8 py-5 text-right bg-slate-50/30 text-slate-900 font-black">2026 누계</th>
                            <th class="px-8 py-5 text-right font-black">5년 평균 대비</th>
                        </tr>
                    </thead>
                    <tbody id="dealer-list" class="divide-y divide-slate-50 text-sm font-bold"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const GITHUB_USER = "jeongkihyun25-arch";
        const REPO_NAME = "Dashboard";
        const t = new Date().getTime();
        const URL_HIST = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/historical_data.xlsx?t=${t}`;
        const URL_CURR = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/current_sales.xls?t=${t}`;

        let rawCurrent = [], rawHistory = [];
        let filterSize = 'ALL';
        let filterPattern = 'ALL';
        let currentMonthNum = new Date().getMonth() + 1;

        // ==================== Strict 필터 (핵심) ====================
        const isStrictTarget = (row, header) => {
            const mtpIdx = header.findIndex(v => String(v || '').toUpperCase().includes('MTP분류'));
            const deptIdx = header.findIndex(v => String(v || '').includes('이익부서'));
            const qtyIdx = header.length - 1;

            if (mtpIdx === -1 || deptIdx === -1) return false;

            const mtp = String(row[mtpIdx] || '').trim().toUpperCase();
            const dept = String(row[deptIdx] || '').trim();
            const qty = parseFloat(String(row[qtyIdx] || '0').replace(/,/g, '')) || 0;

            const isLSR2 = mtp.includes('LSR2');
            const is17_5 = mtp.includes('17.5') && (mtp.includes('DOWN') || mtp.includes('T/L'));
            const isNotPlan = !dept.includes('경영계획');
            const isPositive = qty > 0;

            return (isLSR2 || is17_5) && isNotPlan && isPositive;
        };

        const matchSize = (size, fs) => fs === 'ALL' || String(size || '').includes(fs);
        const matchPattern = (p, fp) => {
            if (fp === 'ALL') return true;
            const pat = String(p || '').toUpperCase();
            if (fp === 'RS002') return pat.includes('STEER') || pat.includes('R-STEER');
            if (fp === 'RD002') return pat.includes('DRIVE') || pat.includes('R-DRIVE');
            return false;
        };

        async function fetchRaw(url) {
            const res = await fetch(url);
            const ab = await res.arrayBuffer();
            const wb = XLSX.read(new Uint8Array(ab), { type: 'array' });
            return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
        }

        function processCurrent(rows) {
            const result = [];
            if (rows.length < 2) return result;
            const h = rows[0].map(v => String(v || '').trim());

            const idxD = h.findIndex(v => v.includes('거래처') || v.includes('딜러'));
            const idxS = h.findIndex(v => v.includes('SIZE') || v.includes('사이즈'));
            const idxP = h.findIndex(v => v.includes('PTTN') || v.includes('패턴'));

            // 당월 QTY 열 찾기 (가장 정확한 방식)
            let idxMonth = -1;
            const monthStr = `2026-${currentMonthNum < 10 ? '0' : ''}${currentMonthNum}`;
            for (let i = 0; i < h.length; i++) {
                if (String(h[i]).includes(monthStr) && String(h[i]).includes('QTY')) {
                    idxMonth = i;
                    break;
                }
            }
            if (idxMonth === -1) {
                for (let i = h.length - 2; i >= 0; i--) {
                    if (String(h[i]).includes('QTY')) {
                        idxMonth = i;
                        break;
                    }
                }
            }

            const idxYTD = h.length - 1;

            for (let i = 1; i < rows.length; i++) {
                const r = rows[i];
                if (!r || r.length < 10) continue;
                if (!isStrictTarget(r, h)) continue;

                const dealer = String(r[idxD] || '기타').trim();
                const size = String(r[idxS] || '');
                const pattern = String(r[idxP] || '');
                const ytd = parseFloat(String(r[idxYTD] || '0').replace(/,/g, '')) || 0;
                const monthQty = idxMonth !== -1 ? parseFloat(String(r[idxMonth] || '0').replace(/,/g, '')) || 0 : 0;

                result.push({ d: dealer, s: size, p: pattern, y: ytd, m: monthQty });
            }
            return result;
        }

        function processHistory(rows) {
            const result = [];
            if (rows.length < 2) return result;
            const h = rows[0].map(v => String(v || '').trim());

            const idxD = 0; // 첫 번째 열 = 거래처명
            const idxS = h.findIndex(v => v.includes('사이즈') || v.includes('SIZE'));
            const idxP = h.findIndex(v => v.includes('패턴명') || v.includes('PTTN'));
            const idxAvg = h.findIndex(v => v.includes('5년평균'));

            for (let i = 1; i < rows.length; i++) {
                const r = rows[i];
                if (!r) continue;
                const sizeStr = String(r[idxS] || '');
                if (!sizeStr.includes('17.5')) continue;

                result.push({
                    d: String(r[idxD] || '기타').trim(),
                    s: sizeStr,
                    p: String(r[idxP] || ''),
                    a: parseFloat(r[idxAvg] || 0) || 0
                });
            }
            return result;
        }

        async function init() {
            document.getElementById('month-label').innerText = `당월 실적 (${currentMonthNum}월)`;

            try {
                const [histRows, currRows] = await Promise.all([
                    fetchRaw(URL_HIST),
                    fetchRaw(URL_CURR)
                ]);

                rawCurrent = processCurrent(currRows);
                rawHistory = processHistory(histRows);

                console.log(`✅ 처리된 Current 행 수: ${rawCurrent.length}`);
                console.log(`✅ 처리된 History 행 수: ${rawHistory.length}`);

                render();
            } catch (e) {
                console.error("데이터 로드 실패:", e);
                alert("데이터를 불러오지 못했습니다. GitHub raw 링크와 파일명을 확인해주세요.");
            }
        }

        window.setFilter = function(type, value) {
            if (type === 'size') filterSize = value;
            else filterPattern = value;

            // 버튼 활성화 상태 업데이트
            ['sz-ALL','sz-205','sz-215','sz-225','pt-ALL','pt-RS002','pt-RD002'].forEach(id => {
                const btn = document.getElementById(id);
                if (btn) {
                    btn.className = (id.includes(value) || (value === 'ALL' && id.includes('ALL'))) 
                        ? 'filter-btn filter-active px-5 py-2 rounded-xl text-xs font-bold' 
                        : 'filter-btn filter-inactive px-5 py-2 rounded-xl text-xs font-bold';
                }
            });

            render();
        };

        function toggleRow(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        function render() {
            const filteredCurrent = rawCurrent.filter(r => 
                matchSize(r.s, filterSize) && matchPattern(r.p, filterPattern)
            );

            const filteredHistory = rawHistory.filter(r => matchSize(r.s, filterSize));

            let totalYTD = 0, totalMonth = 0, totalAvg = 0;
            const dealerMap = {};

            // Current 데이터 집계
            filteredCurrent.forEach(r => {
                totalYTD += r.y;
                totalMonth += r.m;
                if (!dealerMap[r.d]) {
                    dealerMap[r.d] = { y: 0, m: 0, a: 0, details: [] };
                }
                dealerMap[r.d].y += r.y;
                dealerMap[r.d].m += r.m;
                dealerMap[r.d].details.push(r);
            });

            // History 5년 평균 (현재 월까지 비율 적용)
            filteredHistory.forEach(r => {
                const proratedAvg = (r.a / 12) * currentMonthNum;
                totalAvg += proratedAvg;
                if (dealerMap[r.d]) {
                    dealerMap[r.d].a += proratedAvg;
                }
            });

            // UI 업데이트
            document.getElementById('ytd-val').innerText = Math.round(totalYTD).toLocaleString();
            document.getElementById('month-val').innerText = Math.round(totalMonth).toLocaleString();

            const attainment = totalAvg > 0 ? Math.round((totalYTD / totalAvg) * 100) : 0;
            document.getElementById('attainment-pct').innerText = attainment + "%";
            document.getElementById('attainment-bar').style.width = Math.min(attainment, 100) + "%";

            // 테이블 렌더링
            const tbody = document.getElementById('dealer-list');
            tbody.innerHTML = '';

            Object.entries(dealerMap)
                .sort(([,a], [,b]) => b.y - a.y)
                .forEach(([name, data], index) => {
                    const pct = data.a > 0 ? Math.round((data.y / data.a) * 100) : 0;
                    const detailId = `detail-${index}`;

                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 cursor-pointer" onclick="toggleRow('${detailId}')">
                            <td class="px-10 py-5 text-slate-700 font-bold flex items-center gap-2">
                                <span class="text-blue-500 bg-blue-50 rounded w-4 h-4 flex items-center justify-center text-[10px]">+</span> 
                                ${name}
                            </td>
                            <td class="px-8 py-5 text-right text-slate-400 font-medium">${Math.round(data.m).toLocaleString()}</td>
                            <td class="px-8 py-5 text-right bg-slate-50/30 bstk-red font-black text-base">${Math.round(data.y).toLocaleString()}</td>
                            <td class="px-8 py-5 text-right font-black ${pct >= 100 ? 'text-emerald-600' : 'text-slate-500'}">${pct}%</td>
                        </tr>
                        <tr id="${detailId}" class="hidden bg-slate-50/50">
                            <td colspan="4" class="px-10 py-4">
                                <div class="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
                                    <table class="w-full text-xs text-left">
                                        <thead>
                                            <tr class="text-slate-400 border-b border-slate-100">
                                                <th class="pb-2">규격</th>
                                                <th class="pb-2">패턴</th>
                                                <th class="pb-2 text-right">누적 판매</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-slate-50">
                                            ${data.details.map(det => `
                                                <tr>
                                                    <td class="py-2 font-medium">${det.s}</td>
                                                    <td class="py-2 text-slate-500">${det.p}</td>
                                                    <td class="py-2 text-right bstk-red font-bold">${Math.round(det.y).toLocaleString()}</td>
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </td>
                        </tr>`;
                });
        }

        window.onload = init;
    </script>
</body>
</html>
