<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSTK 17.5인치 실적</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; background:#f8fafc; }
.bstk-red { color:#E30613; }
.card-shadow { box-shadow:0 10px 25px rgba(0,0,0,0.05); }
.filter-active { background:#1e293b;color:white; }
.filter-inactive { background:white;color:#64748b;border:1px solid #e2e8f0; }
</style>
</head>

<body>

<header class="bg-white p-4 flex justify-between">
<h1 class="font-bold">BSTK 17.5인치 실적</h1>
<select id="month-select" onchange="changeMonth()"></select>
</header>

<main class="p-6">

<div class="grid grid-cols-3 gap-4 mb-6">
<div class="bg-white p-6 card-shadow">
누계
<div id="ytd" class="text-3xl font-bold"></div>
</div>

<div class="bg-white p-6 card-shadow">
당월
<div id="mon" class="text-3xl font-bold"></div>
</div>

<div class="bg-white p-6 card-shadow">
달성률
<div id="pct" class="text-3xl font-bold"></div>
</div>
</div>

<table class="w-full bg-white card-shadow">
<thead>
<tr>
<th>딜러</th>
<th>당월</th>
<th>누계</th>
<th>%</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

</main>

<script>

const URL_CURR = "https://raw.githubusercontent.com/jeongkihyun25-arch/Dashboard/main/current_sales.xls";
const URL_HIST = "https://raw.githubusercontent.com/jeongkihyun25-arch/Dashboard/main/historical_data.xlsx";

let rawCurrent = [];
let rawHistory = [];
let selectedMonth = 1;

// 🔥 필터
function isValid(row, h){
    const sizeIdx = h.findIndex(v=>v.includes('SIZE')||v.includes('사이즈'));
    if(sizeIdx==-1) return false;

    const size = String(row[sizeIdx]||'');
    if(size.includes('235')) return false;

    return true;
}

// 🔥 데이터 로드
async function loadData(){

    try{
        // current
        const res = await fetch(URL_CURR+"?t="+Date.now());
        if(!res.ok) throw "current 실패";

        const ab = await res.arrayBuffer();
        const wb = XLSX.read(new Uint8Array(ab), {type:'array'});
        rawCurrent = processCurrent(wb.Sheets[wb.SheetNames[0]]);

        // history (실패해도 무시)
        try{
            const hres = await fetch(URL_HIST);
            if(hres.ok){
                const hab = await hres.arrayBuffer();
                const hwb = XLSX.read(new Uint8Array(hab), {type:'array'});
                rawHistory = processHistory(hwb.Sheets[hwb.SheetNames[0]]);
            }
        }catch{}

        // 최신월 자동
        if(rawCurrent.length){
            const months = Object.keys(rawCurrent[0].monthly);
            selectedMonth = Math.max(...months.map(Number));
        }

        initMonth();
        render();

    }catch(e){
        alert("❌ current_sales 로드 실패");
        console.error(e);
    }
}

// 🔥 current 처리 (핵심)
function processCurrent(sheet){

    const rows = XLSX.utils.sheet_to_json(sheet,{header:1});
    const h = rows[0];

    const idxD = h.findIndex(v=>v.includes('거래처')||v.includes('딜러'));
    const idxS = h.findIndex(v=>v.includes('SIZE')||v.includes('사이즈'));

    // 월 컬럼 찾기
    const monthCols = {};
    h.forEach((v,i)=>{
        const txt = String(v).replace(/\s+/g,'');
        const m = txt.match(/2026[-\/]?(\d{1,2})/);
        if(m && (txt.includes('QTY')||txt.includes('수량'))){
            monthCols[parseInt(m[1])] = i;
        }
    });

    const result=[];

    for(let i=1;i<rows.length;i++){
        const r = rows[i];
        if(!r || !isValid(r,h)) continue;

        let y=0;
        const monthly={};

        Object.entries(monthCols).forEach(([m,idx])=>{
            let v = parseFloat(String(r[idx]||0).replace(/,/g,''))||0;

            if(v<0) v=0; // 🔥 마이너스 제거

            monthly[m]=v;
            y+=v;
        });

        result.push({
            d: String(r[idxD]||'기타'),
            s: String(r[idxS]||''),
            y:y,
            monthly:monthly
        });
    }

    return result;
}

// 🔥 history
function processHistory(sheet){
    const rows = XLSX.utils.sheet_to_json(sheet,{header:1});
    return rows.slice(1).map(r=>({
        d:String(r[0]||''),
        a:parseFloat(r[2]||0)||0
    }));
}

// 🔥 월 선택 UI
function initMonth(){
    const sel = document.getElementById('month-select');
    sel.innerHTML='';

    for(let i=1;i<=12;i++){
        const op=document.createElement('option');
        op.value=i;
        op.textContent=i+'월';
        if(i==selectedMonth) op.selected=true;
        sel.appendChild(op);
    }
}

function changeMonth(){
    selectedMonth = parseInt(document.getElementById('month-select').value);
    render();
}

// 🔥 렌더
function render(){

    let totalY=0,totalM=0,totalA=0;
    const map={};

    rawCurrent.forEach(r=>{
        const m = r.monthly[selectedMonth]||0;

        totalY+=r.y;
        totalM+=m;

        if(!map[r.d]) map[r.d]={y:0,m:0,a:0};
        map[r.d].y+=r.y;
        map[r.d].m+=m;
    });

    rawHistory.forEach(r=>{
        totalA+=r.a;
        if(map[r.d]) map[r.d].a+=r.a;
    });

    document.getElementById('ytd').innerText = Math.round(totalY);
    document.getElementById('mon').innerText = Math.round(totalM);

    const pct = totalA>0 ? Math.round(totalY/totalA*100):0;
    document.getElementById('pct').innerText = pct+'%';

    const tbody = document.getElementById('list');
    tbody.innerHTML='';

    Object.entries(map)
    .sort((a,b)=>b[1].y-a[1].y)
    .forEach(([name,d])=>{

        const p = d.a>0 ? Math.round(d.y/d.a*100):0;

        tbody.innerHTML+=`
        <tr>
        <td>${name}</td>
        <td>${Math.round(d.m)}</td>
        <td class="bstk-red">${Math.round(d.y)}</td>
        <td>${p}%</td>
        </tr>`;
    });
}

window.onload = loadData;

</script>

</body>
</html>
