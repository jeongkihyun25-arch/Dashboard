<script>
const GITHUB_USER = "jeongkihyun25-arch";
const REPO_NAME = "Dashboard";

const URL_CURR = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/current_sales.xls?t=${Date.now()}`;
const URL_HIST = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/historical_data.xlsx?t=${Date.now()}`;

let rawCurrent = [];
let rawHistory = [];

let filterSize = 'ALL';
let filterPattern = 'ALL';
let selectedMonth = 1;
let availableMonths = [];


// 🔥 공통 숫자 처리
const num = v => parseFloat(String(v||'0').replace(/,/g,'')) || 0;


// 🔥 대상 필터 (기존 유지 + 안정화)
const isStrictTarget = (row, header) => {
    const mtpIdx = header.findIndex(v => String(v).includes('MTP'));
    const deptIdx = header.findIndex(v => String(v).includes('이익부서'));
    const sizeIdx = header.findIndex(v => String(v).includes('SIZE') || String(v).includes('사이즈'));

    if (mtpIdx === -1 || sizeIdx === -1) return false;

    const mtp = String(row[mtpIdx] || '').toUpperCase();
    const size = String(row[sizeIdx] || '');
    const dept = deptIdx !== -1 ? String(row[deptIdx] || '') : '';

    if (size.includes('235')) return false;
    if (dept.includes('경영계획')) return false;

    return mtp.includes('17.5') || mtp === 'LSR2';
};


// 🔥 메인 로드
async function loadData() {
    try {
        const [cRes, hRes] = await Promise.all([fetch(URL_CURR), fetch(URL_HIST)]);
        const cAb = await cRes.arrayBuffer();
        const hAb = await hRes.arrayBuffer();

        const cWb = XLSX.read(new Uint8Array(cAb), {type:'array'});
        const hWb = XLSX.read(new Uint8Array(hAb), {type:'array'});

        rawCurrent = processCurrent(cWb.Sheets[cWb.SheetNames[0]]);
        rawHistory = processHistory(hWb.Sheets[hWb.SheetNames[0]]);

        // 🔥 최신 월 자동 선택
        selectedMonth = Math.max(...availableMonths);

        initMonthSelector();
        render();

    } catch(e){
        console.error(e);
        alert("파일 로드 실패");
    }
}


// 🔥 current 처리 (핵심)
function processCurrent(sheet){

    const rows = XLSX.utils.sheet_to_json(sheet,{header:1});
    const h = rows[0].map(v=>String(v||'').trim());

    const idxD = h.findIndex(v=>v.includes('거래처')||v.includes('딜러'));
    const idxS = h.findIndex(v=>v.includes('SIZE')||v.includes('사이즈'));
    const idxP = h.findIndex(v=>v.includes('PTTN')||v.includes('패턴'));

    // 🔥 월 컬럼 미리 전부 찾기 (성능 핵심)
    const monthCols = {};

    h.forEach((v,i)=>{
        const txt = String(v).replace(/\s+/g,'');
        const match = txt.match(/2026[-\/]?(\d{1,2})/);

        if(match){
            const m = parseInt(match[1]);

            if(txt.includes('QTY') || txt.includes('수량') || txt.includes('판매')){
                monthCols[m] = i;
            }
        }
    });

    availableMonths = Object.keys(monthCols).map(Number).sort((a,b)=>a-b);

    const result = [];

    for(let i=1;i<rows.length;i++){
        const r = rows[i];
        if(!r || !isStrictTarget(r,h)) continue;

        let y = 0;
        const monthly = {};

        availableMonths.forEach(m=>{
            let val = num(r[monthCols[m]]);

            // 🔥 마이너스 제거
            if(val < 0) val = 0;

            monthly[m] = val;
            y += val;
        });

        if(y <= 0) continue;

        result.push({
            d: String(r[idxD]||'기타').trim(),
            s: String(r[idxS]||''),
            p: String(r[idxP]||''),
            y,
            monthly
        });
    }

    return result;
}


// 🔥 history 처리 (그대로 유지)
function processHistory(sheet){
    const rows = XLSX.utils.sheet_to_json(sheet,{header:1});
    const h = rows[0];

    const idxS = h.findIndex(v=>String(v).includes('사이즈'));
    const idxAvg = h.findIndex(v=>String(v).includes('5년'));

    return rows.slice(1).map(r=>({
        d: String(r[0]||''),
        a: num(r[idxAvg])
    })).filter(r=>!String(r[idxS]).includes('235'));
}


// 🔥 월 선택
function initMonthSelector(){
    const sel = document.getElementById('month-select');
    sel.innerHTML='';

    availableMonths.forEach(m=>{
        const opt=document.createElement('option');
        opt.value=m;
        opt.textContent=m+'월';
        if(m===selectedMonth) opt.selected=true;
        sel.appendChild(opt);
    });
}

window.changeMonth = function(){
    selectedMonth = parseInt(document.getElementById('month-select').value);
    render();
};


// 🔥 렌더 (고급)
function render(){

    const cur = rawCurrent.filter(r=>
        (filterSize==='ALL'||r.s.includes(filterSize)) &&
        (filterPattern==='ALL'||
         (filterPattern==='RS002' && r.p.toUpperCase().includes('STEER'))||
         (filterPattern==='RD002' && r.p.toUpperCase().includes('DRIVE')))
    );

    let totalYTD=0,totalMonth=0,totalPrev=0,total5yr=0;
    const dealerMap={};

    cur.forEach(r=>{
        const m = r.monthly[selectedMonth]||0;
        const prev = r.monthly[selectedMonth-1]||0;

        totalYTD += r.y;
        totalMonth += m;
        totalPrev += prev;

        if(!dealerMap[r.d]) dealerMap[r.d]={y:0,m:0,p:0,a:0,details:[]};

        dealerMap[r.d].y+=r.y;
        dealerMap[r.d].m+=m;
        dealerMap[r.d].p+=prev;
        dealerMap[r.d].details.push({...r,m});
    });

    rawHistory.forEach(r=>{
        total5yr += r.a;
        if(dealerMap[r.d]) dealerMap[r.d].a+=r.a;
    });

    document.getElementById('ytd-val').innerText = Math.round(totalYTD).toLocaleString();
    document.getElementById('month-val').innerText = Math.round(totalMonth).toLocaleString();
    document.getElementById('cum-month').innerText = selectedMonth;
    document.getElementById('month-label').innerText = `${selectedMonth}월 실적`;

    const pct = total5yr>0 ? Math.round(totalYTD/total5yr*100) : 0;
    document.getElementById('attainment-pct').innerText = pct+"%";

    document.getElementById('row-count').innerText =
        `딜러 ${Object.keys(dealerMap).length}개 / 누계 ${Math.round(totalYTD).toLocaleString()}`;

    const tbody = document.getElementById('dealer-list');
    tbody.innerHTML='';

    Object.entries(dealerMap)
    .sort((a,b)=>b[1].y - a[1].y)
    .forEach(([name,d],idx)=>{

        const growth = d.p>0 ? Math.round((d.m-d.p)/d.p*100) : 0;

        const id=`detail-${idx}`;

        tbody.innerHTML+=`
        <tr onclick="toggleRow('${id}')" class="hover:bg-slate-50 cursor-pointer">
            <td class="px-8 py-5 font-semibold">${name}</td>
            <td class="px-8 py-5 text-right">${Math.round(d.m).toLocaleString()}</td>
            <td class="px-8 py-5 text-right font-black bstk-red">${Math.round(d.y).toLocaleString()}</td>
            <td class="px-8 py-5 text-right ${growth>=0?'text-emerald-600':'text-red-500'}">
                ${growth>=0?'+':''}${growth}%
            </td>
        </tr>

        <tr id="${id}" class="hidden bg-slate-50">
        <td colspan="4" class="px-8 py-4">
        <div class="bg-white border rounded-2xl p-5 text-xs">
        <table class="w-full">
        <thead><tr class="text-slate-400">
        <th>규격</th><th>패턴</th><th class="text-right">누계</th>
        </tr></thead>
        <tbody>
        ${d.details.map(x=>`
        <tr>
        <td>${x.s}</td>
        <td>${x.p}</td>
        <td class="text-right bstk-red">${Math.round(x.y).toLocaleString()}</td>
        </tr>`).join('')}
        </tbody></table>
        </div></td></tr>`;
    });
}


window.onload = loadData;
</script>
