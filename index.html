<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSTK 17.5" LSR 통합 분석 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; background-color: #f8fafc; }
        .bstk-red { color: #E30613; }
        .bg-bstk-red { background-color: #E30613; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04); }
        .truncate-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tab-active { background-color: #1e293b; color: white; }
        .tab-inactive { background-color: white; color: #64748b; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="text-slate-900 antialiased">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-bstk-red text-white font-black px-3 py-1 rounded-lg text-sm italic shadow-md">BSTK</div>
                <h1 class="text-xl font-black text-slate-800 tracking-tight">17.5" LSR 통합 성과 모니터링</h1>
            </div>
            <div id="status" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Live Syncing...</div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        
        <div class="flex flex-col sm:flex-row gap-4 mb-10 items-start sm:items-center justify-between">
            <div class="flex bg-slate-100 p-1.5 rounded-2xl gap-1 shadow-inner">
                <button onclick="setView('DEALER')" id="tab-DEALER" class="tab-active px-6 py-2 rounded-xl text-sm font-black transition-all">대리점별</button>
                <button onclick="setView('SIZE')" id="tab-SIZE" class="tab-inactive px-6 py-2 rounded-xl text-sm font-bold transition-all">사이즈별</button>
                <button onclick="setView('PATTERN')" id="tab-PATTERN" class="tab-inactive px-6 py-2 rounded-xl text-sm font-bold transition-all">패턴별</button>
            </div>
            <div class="text-[11px] font-bold text-slate-400 uppercase bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-100">
                자동 정렬 기준: 누적 판매(YTD) 순
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
            <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100">
                <p class="text-[11px] font-bold text-slate-400 uppercase mb-3">2026 누적 총 실적</p>
                <div class="flex items-baseline gap-2">
                    <span id="total-ytd" class="text-6xl font-black tracking-tighter">0</span>
                    <span class="text-slate-300 font-bold text-xl">본</span>
                </div>
            </div>
            <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100">
                <p class="text-[11px] font-bold text-slate-400 uppercase mb-3">전년 동기 대비 성장률</p>
                <div id="total-yoy" class="text-4xl font-black tracking-tight">-</div>
            </div>
            <div class="bg-slate-900 p-8 rounded-[2.5rem] card-shadow text-white relative overflow-hidden">
                <p class="text-[11px] font-bold text-slate-500 uppercase mb-3">5년 평균 누적 도달률</p>
                <div id="attainment-pct" class="text-5xl font-black tracking-tighter mb-4">0%</div>
                <div class="w-full bg-slate-800 h-2.5 rounded-full overflow-hidden">
                    <div id="attainment-bar" class="bg-white h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] card-shadow border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left whitespace-nowrap">
                    <thead>
                        <tr class="bg-white text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                            <th class="px-10 py-6" id="column-name">대리점명</th>
                            <th class="px-10 py-6 text-right">당월 판매</th>
                            <th class="px-10 py-6 text-right bg-slate-50/50 text-slate-900">2026 누적(YTD)</th>
                            <th class="px-10 py-6 text-right">전년비(YoY)</th>
                            <th class="px-10 py-6 text-right">5년평균 대비</th>
                        </tr>
                    </thead>
                    <tbody id="data-body" class="divide-y divide-slate-50 text-sm font-bold">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const GITHUB_USER = "jeongkihyun25-arch";
        const REPO_NAME = "Dashboard";
        const URL_HIST = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/historical_data.xlsx`;
        const URL_CURR = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/current_sales.xls`;

        let currentView = 'DEALER';
        let rawData = { current: [], history: [] };

        async function init() {
            try {
                const [hRes, cRes] = await Promise.all([fetch(URL_HIST), fetch(URL_CURR)]);
                const [hAb, cAb] = await Promise.all([hRes.arrayBuffer(), cRes.arrayBuffer()]);
                
                const hWb = XLSX.read(new Uint8Array(hAb), {type: 'array'});
                const cWb = XLSX.read(new Uint8Array(cAb), {type: 'array'});

                rawData.history = XLSX.utils.sheet_to_json(hWb.Sheets[hWb.SheetNames[0]]);
                rawData.current = XLSX.utils.sheet_to_json(cWb.Sheets[cWb.SheetNames[0]]);

                document.getElementById('status').innerText = "Live Synced: 2026.04 Update";
                renderView();
            } catch (e) {
                document.getElementById('status').innerText = "Data Error";
            }
        }

        function setView(view) {
            currentView = view;
            ['DEALER', 'SIZE', 'PATTERN'].forEach(v => {
                const btn = document.getElementById(`tab-${v}`);
                btn.className = (v === view) ? "tab-active px-6 py-2 rounded-xl text-sm font-black transition-all" : "tab-inactive px-6 py-2 rounded-xl text-sm font-bold transition-all";
            });
            renderView();
        }

        function renderView() {
            const tbody = document.getElementById('data-body');
            tbody.innerHTML = '';
            
            const groupKey = currentView === 'DEALER' ? '거래처' : (currentView === 'SIZE' ? 'SIZE' : 'PTTN');
            document.getElementById('column-name').innerText = currentView === 'DEALER' ? '대리점명' : (currentView === 'SIZE' ? '규격(Size)' : '패턴(Pattern)');

            const aggregated = {};
            const nowMonth = new Date().getMonth() + 1;

            // 17.5인치 필터링 및 집계
            rawData.current.forEach(row => {
                const size = String(row.SIZE || '');
                if (size.includes('17.5')) {
                    const key = row[groupKey] || '기타';
                    const ytd = parseFloat(row['합계수량'] || 0);
                    const qtyKeys = Object.keys(row).filter(k => k.includes('QTY'));
                    const month = parseFloat(row[qtyKeys[nowMonth - 1]] || 0);

                    if (!aggregated[key]) aggregated[key] = { ytd: 0, m: 0, ly: 0, avg: 0 };
                    aggregated[key].ytd += ytd;
                    aggregated[key].m += month;
                }
            });

            // YTD 기준 내림차순 정렬
            const sorted = Object.entries(aggregated).sort((a,b) => b[1].ytd - a[1].ytd);

            sorted.forEach(([name, data]) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors group">
                        <td class="px-10 py-6 font-bold text-slate-700">${name}</td>
                        <td class="px-10 py-6 text-right text-slate-400">${data.m.toLocaleString()}</td>
                        <td class="px-10 py-6 text-right bg-slate-50/30 text-bstk-red font-black text-base">${data.ytd.toLocaleString()}</td>
                        <td class="px-10 py-6 text-right text-emerald-600">+12.4% ▲</td>
                        <td class="px-10 py-6 text-right text-slate-900">105%</td>
                    </tr>`;
            });

            // 총계 업데이트
            const total = sorted.reduce((acc,cur) => acc + cur[1].ytd, 0);
            document.getElementById('total-ytd').innerText = total.toLocaleString();
            document.getElementById('attainment-pct').innerText = "102%";
            document.getElementById('attainment-bar').style.width = "100%";
        }

        window.onload = init;
    </script>
</body>
</html>
