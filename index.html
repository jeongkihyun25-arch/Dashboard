<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSTK LT WG 실적 관리 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; background-color: #f8fafc; }
        .bstk-red { color: #E30613; }
        .bg-bstk-red { background-color: #E30613; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04); }
        .filter-btn { transition: all 0.2s ease; }
        .filter-active { background-color: #1e293b; color: white; }
        .filter-inactive { background-color: white; color: #64748b; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="text-slate-900 antialiased overflow-x-hidden">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-bstk-red text-white font-black px-3 py-1 rounded-lg text-sm italic shadow-md">BSTK</div>
                <h1 class="text-lg font-black text-slate-800 tracking-tight">LT WG 실적 확인</h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="row-count" class="text-[11px] font-bold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200 hidden md:block">데이터 로딩 중...</div>
                <select id="month-select" onchange="changeMonth()" class="border border-slate-300 rounded-xl px-4 py-1.5 text-sm font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-red-500">
                    </select>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        
        <div class="bg-white p-5 rounded-[2rem] card-shadow border border-slate-100 mb-8 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">규격 선택</span>
                <div class="flex gap-1.5">
                    <button onclick="setFilter('size', 'ALL')" id="sz-ALL" class="filter-btn filter-active px-5 py-2 rounded-xl text-xs font-bold">전체</button>
                    <button onclick="setFilter('size', '205')" id="sz-205" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-xs font-bold">205</button>
                    <button onclick="setFilter('size', '215')" id="sz-215" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-xs font-bold">215</button>
                    <button onclick="setFilter('size', '225')" id="sz-225" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-xs font-bold">225</button>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">패턴 필터</span>
                <div class="flex gap-1.5">
                    <button onclick="setFilter('pattern', 'ALL')" id="pt-ALL" class="filter-btn filter-active px-4 py-2 rounded-xl text-xs font-bold">전체</button>
                    <button onclick="setFilter('pattern', 'RS002')" id="pt-RS002" class="filter-btn filter-inactive px-4 py-2 rounded-xl text-xs font-bold">RS002</button>
                    <button onclick="setFilter('pattern', 'RD002')" id="pt-RD002" class="filter-btn filter-inactive px-4 py-2 rounded-xl text-xs font-bold">RD002</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100">
                <p class="text-[11px] font-bold text-slate-400 uppercase mb-3 italic">올해 누적 실적 (YTD)</p>
                <div class="flex items-baseline gap-2 mb-2">
                    <span id="ytd-val" class="text-6xl font-black tracking-tighter">0</span>
                    <span class="text-slate-300 font-bold text-xl">본</span>
                </div>
                <p class="text-[10px] text-slate-400 font-bold italic">* 경영계획/반품 제외, 235 제외 (올림 적용)</p>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100 border-t-4 border-t-red-500 relative">
                <div class="flex justify-between items-start mb-3">
                    <p id="month-label" class="text-[11px] font-bold text-slate-400 uppercase italic">당월 실적</p>
                    <div id="yoy-badge" class="bg-slate-100 text-slate-500 text-[10px] px-2.5 py-1 rounded-md font-black border border-slate-200">전년비 계산중</div>
                </div>
                <div class="flex items-baseline gap-2 bstk-red mb-1">
                    <span id="month-val" class="text-6xl font-black tracking-tighter">0</span>
                    <span class="text-slate-300 font-bold text-xl">본</span>
                </div>
                <p id="ly-month-text" class="text-[11px] text-slate-500 font-bold">작년 동월: <span id="ly-month-val">0</span>본</p>
            </div>

            <div class="bg-slate-900 p-8 rounded-[2.5rem] card-shadow text-white relative">
                <p class="text-[11px] font-bold text-slate-500 uppercase mb-3">5년 평균 누적 도달률</p>
                <div id="attainment-pct" class="text-6xl font-black tracking-tighter mb-4">0%</div>
                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden mb-4">
                    <div id="attainment-bar" class="bg-emerald-400 h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p class="text-[10px] text-slate-300 italic">비교 기준: 전체 시장 누계 vs <span class="text-emerald-400 font-bold">월별 5년 평균 합계</span></p>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] card-shadow border border-slate-100 overflow-hidden">
            <div class="px-8 py-6 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center">
                <h3 class="font-black text-slate-800 italic">딜러별 판매추이</h3>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">누계 기준 내림차순 정렬</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left whitespace-nowrap min-w-[1000px]">
                    <thead>
                        <tr class="bg-white text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                            <th class="px-10 py-5">딜러명 (클릭 시 상세)</th>
                            <th class="px-6 py-5 text-right text-slate-400 bg-slate-50/30">전년 동월</th>
                            <th class="px-6 py-5 text-right">당월 판매</th>
                            <th class="px-6 py-5 text-right">전년비(YoY)</th>
                            <th class="px-8 py-5 text-right bg-slate-50/50 text-slate-900 font-black border-l border-slate-50">올해 누계</th>
                            <th class="px-8 py-5 text-right font-black">5년 평균비</th>
                        </tr>
                    </thead>
                    <tbody id="dealer-list" class="divide-y divide-slate-50 text-sm font-bold"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const GITHUB_USER = "jeongkihyun25-arch";
        const REPO_NAME = "Dashboard";
        const t = new Date().getTime();
        
        const URL_CURR = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/current_sales.xls?t=${t}`;
        const URL_LAST_YEAR = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/last_year_sales.xls?t=${t}`;
        const URL_HIST = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/historical_data.xlsx?t=${t}`;

        let rawCurrent = [], rawLastYear = [], rawHistory = [], filterSize = 'ALL', filterPattern = 'ALL', selectedMonth = new Date().getMonth() + 1;

        // **정밀 매칭 로직 (235 제외 + 마이너스 제외)**
        const isStrictTarget = (row, header) => {
            const mtpIdx = header.findIndex(v => String(v || '').toUpperCase().includes('MTP분류'));
            const deptIdx = header.findIndex(v => String(v || '').includes('이익부서'));
            const sizeIdx = header.findIndex(v => String(v || '').toUpperCase().includes('SIZE') || String(v || '').includes('사이즈'));
            
            let qtyIdx = header.findIndex(v => String(v).replace(/\s/g, '') === '합계수량');
            if (qtyIdx === -1) qtyIdx = header.length - 1; // 못 찾으면 맨 오른쪽

            if (mtpIdx === -1 || sizeIdx === -1) return false;

            const mtp = String(row[mtpIdx] || '').trim().toUpperCase();
            const size = String(row[sizeIdx] || '').trim();
            const qty = parseFloat(String(row[qtyIdx] || '0').replace(/,/g, '')) || 0;
            const dept = deptIdx !== -1 ? String(row[deptIdx] || '').trim() : '';

            if (size.includes('235')) return false; 
            if (qty <= 0) return false; 
            if (dept.includes('경영계획')) return false; 

            const isLSR2 = mtp === 'LSR2';
            const is17_5 = mtp.includes('17.5') && (mtp.includes('DOWN') || mtp.includes('T/L') || mtp.includes('TBR'));

            return isLSR2 || is17_5;
        };

        const matchFilterSize = (s, fs) => fs === 'ALL' || String(s).includes(fs);
        const matchPattern = (p, fp) => {
            if(fp === 'ALL') return true;
            const up = String(p).toUpperCase();
            return fp === 'RS002' ? (up.includes('RS002') || up.includes('STEER')) : (up.includes('RD002') || up.includes('DRIVE'));
        };

        async function fetchRaw(url) {
            try {
                const res = await fetch(url);
                if (!res.ok) return []; 
                const ab = await res.arrayBuffer();
                const wb = XLSX.read(new Uint8Array(ab), {type: 'array'});
                return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
            } catch (e) {
                return [];
            }
        }

        async function init() {
            selectedMonth = new Date().getMonth() + 1;
            document.getElementById('month-label').innerText = `당월 실적 (${selectedMonth}월)`;
            
            const [cRows, lyRows, hRows] = await Promise.all([fetchRaw(URL_CURR), fetchRaw(URL_LAST_YEAR), fetchRaw(URL_HIST)]);
            
            rawCurrent = processCurrent(cRows);
            rawLastYear = processCurrent(lyRows);
            rawHistory = processHistory(hRows); // 이제 평균 누적이 정상적으로 잡힙니다
            
            if(rawLastYear.length === 0) {
                document.getElementById('ly-month-text').innerText = "작년 데이터가 없습니다.";
            }

            initMonthSelector();
            render();
        }

        function processCurrent(rows) {
            if (rows.length < 2) return [];
            const h = rows[0].map(v => String(v || '').trim());
            const idxD = h.findIndex(v => v.includes('거래처') || v.includes('딜러'));
            const idxS = h.findIndex(v => v.toUpperCase().includes('SIZE') || v.includes('사이즈'));
            const idxP = h.findIndex(v => v.toUpperCase().includes('PTTN') || v.includes('패턴'));
            
            let idxYTD = h.findIndex(v => String(v).replace(/\s/g, '') === '합계수량');
            if (idxYTD === -1) idxYTD = h.length - 1;

            const monthlyIdx = {};
            for(let i=0; i<h.length; i++) {
                if (String(h[i]).toUpperCase().replace(/\s/g, '') === 'QTY') {
                    const prevCol = String(h[i-1] || '');
                    const match = prevCol.match(/-(\d{2})/); // -01, -02 등의 월을 완벽하게 캐치
                    if(match) monthlyIdx[parseInt(match[1], 10)] = i;
                }
            }

            const result = [];
            for (let i = 1; i < rows.length; i++) {
                const r = rows[i];
                if (!r || !isStrictTarget(r, h)) continue;
                
                const yVal = Math.max(0, parseFloat(String(r[idxYTD] || '0').replace(/,/g, '')) || 0);
                
                const monthly = {};
                for(let m=1; m<=12; m++) {
                    monthly[m] = monthlyIdx[m] ? Math.max(0, parseFloat(String(r[monthlyIdx[m]] || '0').replace(/,/g, '')) || 0) : 0;
                }
                
                result.push({ d: String(r[idxD]||'기타').trim(), s: String(r[idxS]||''), p: String(r[idxP]||''), y: yVal, monthly: monthly });
            }
            return result;
        }

        // **새로 바뀐 History (구버전 헤더, 신버전 헤더 완벽 호환)**
        function processHistory(rows) {
            if (rows.length < 2) return [];
            const h = rows[0].map(v => String(v || '').trim());
            const idxD = h.findIndex(v => v.includes('거래처')); 
            const idxS = h.findIndex(v => v.includes('사이즈') || v.toUpperCase().includes('SIZE')); // 이전/현재 헤더 모두 호환
            
            // 월별 5년평균 인덱스 탐색
            const monthIdx = {};
            for(let m=1; m<=12; m++) {
                monthIdx[m] = h.findIndex(v => String(v).replace(/\s/g, '') === `${m}월(5년평균)`);
            }
            const idxAvgYear = h.findIndex(v => {
                const clean = String(v).replace(/\s/g, '');
                return clean.includes('5년평균(연간)') || clean === '5년평균' || clean.includes('5년평균');
            });

            const result = [];
            for (let i = 1; i < rows.length; i++) {
                const r = rows[i];
                if (!r || idxS === -1) continue; 

                const size = String(r[idxS] || '');
                if (size.includes('235')) continue; 
                if (!size.includes('17.5')) continue;
                
                const monthlyAvg = {};
                const annualAvg = parseFloat(String(r[idxAvgYear]||0).replace(/,/g,'')) || 0;

                for(let m=1; m<=12; m++) {
                    if(monthIdx[m] !== -1) {
                        monthlyAvg[m] = parseFloat(String(r[monthIdx[m]]||0).replace(/,/g,'')) || 0;
                    } else {
                        monthlyAvg[m] = annualAvg / 12; 
                    }
                }
                result.push({ d: String(r[idxD !== -1 ? idxD : 0]||'기타').trim(), s: size, monthlyAvg: monthlyAvg });
            }
            return result;
        }

        function initMonthSelector() {
            const sel = document.getElementById('month-select');
            sel.innerHTML = '';
            for (let m = 1; m <= selectedMonth; m++) {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = `${m}월`;
                if (m === selectedMonth) opt.selected = true;
                sel.appendChild(opt);
            }
        }

        window.changeMonth = function() {
            selectedMonth = parseInt(document.getElementById('month-select').value);
            render();
        };

        window.setFilter = function(t, v) {
            if(t === 'size') filterSize = v; else filterPattern = v;
            ['sz-ALL','sz-205','sz-215','sz-225','pt-ALL','pt-RS002','pt-RD002'].forEach(id => {
                const btn = document.getElementById(id);
                if(btn) btn.className = id.includes(v) ? 'filter-btn filter-active px-5 py-2 rounded-xl text-xs font-bold' : 'filter-btn filter-inactive px-5 py-2 rounded-xl text-xs font-bold';
            });
            render();
        }

        function toggleRow(id) { document.getElementById(id).classList.toggle('hidden'); }

        // 올림(Math.ceil)이 적용된 YoY 계산
        const getYoYHTML = (cur, prev) => {
            if (prev === 0 && cur > 0) return `<span class="text-blue-500 font-black">신규</span>`;
            if (prev === 0 && cur === 0) return `<span class="text-slate-300">-</span>`;
            const pct = Math.ceil(((cur / prev) - 1) * 100);
            if (pct > 0) return `<span class="text-emerald-500 font-black">+${pct}% ▲</span>`;
            if (pct < 0) return `<span class="text-red-500 font-black">${pct}% ▼</span>`;
            return `<span class="text-slate-400 font-bold">동일</span>`;
        };

        const getBadgeHTML = (cur, prev) => {
            if (prev === 0 && cur > 0) return { t: '신규 진입', c: 'bg-blue-50 text-blue-600 border-blue-200' };
            if (prev === 0 && cur === 0) return { t: '실적 없음', c: 'bg-slate-50 text-slate-400 border-slate-200' };
            const pct = Math.ceil(((cur / prev) - 1) * 100);
            if (pct > 0) return { t: `전년비 +${pct}% ▲`, c: 'bg-emerald-50 text-emerald-600 border-emerald-200' };
            if (pct < 0) return { t: `전년비 ${pct}% ▼`, c: 'bg-red-50 text-red-600 border-red-200' };
            return { t: '전년과 동일', c: 'bg-slate-50 text-slate-500 border-slate-200' };
        };

        function render() {
            const cur = rawCurrent.filter(r => matchFilterSize(r.s, filterSize) && matchPattern(r.p, filterPattern));
            const ly = rawLastYear.filter(r => matchFilterSize(r.s, filterSize) && matchPattern(r.p, filterPattern));
            const his = rawHistory.filter(r => matchFilterSize(r.s, filterSize)); 

            let sY = 0, sM = 0, sM_LY = 0, sA = 0;
            const dMap = {};
            
            cur.forEach(r => {
                const mQty = r.monthly[selectedMonth] || 0;
                sY += r.y; sM += mQty;
                if(!dMap[r.d]) dMap[r.d] = { y:0, m:0, m_ly:0, a:0, details:[] };
                dMap[r.d].y += r.y; dMap[r.d].m += mQty;
                dMap[r.d].details.push({...r, m: mQty});
            });

            ly.forEach(r => {
                const mQtyLY = r.monthly[selectedMonth] || 0;
                sM_LY += mQtyLY;
                if(dMap[r.d]) {
                    dMap[r.d].m_ly += mQtyLY;
                } else {
                    dMap[r.d] = { y:0, m:0, m_ly:mQtyLY, a:0, details:[] };
                }
            });

            his.forEach(r => {
                let tA = 0;
                for(let m=1; m<=selectedMonth; m++) {
                    tA += r.monthlyAvg[m];
                }
                sA += tA;
                if(dMap[r.d]) {
                    dMap[r.d].a += tA;
                } else {
                    dMap[r.d] = { y:0, m:0, m_ly:0, a:tA, details:[] }; // 과거 이력만 있는 경우도 테이블에 잡히게
                }
            });

            // Math.ceil (올림) 적용하여 노출
            document.getElementById('ytd-val').innerText = Math.ceil(sY).toLocaleString();
            document.getElementById('month-val').innerText = Math.ceil(sM).toLocaleString();
            document.getElementById('month-label').innerText = `당월 실적 (${selectedMonth}월)`;
            document.getElementById('row-count').innerText = `데이터: ${cur.length}건`;
            
            if(rawLastYear.length > 0) {
                document.getElementById('ly-month-val').innerText = Math.ceil(sM_LY).toLocaleString();
                const badge = getBadgeHTML(sM, sM_LY);
                const badgeEl = document.getElementById('yoy-badge');
                badgeEl.innerText = badge.t;
                badgeEl.className = `text-[10px] px-2.5 py-1 rounded-md font-black border ${badge.c}`;
            }

            const pct = sA > 0 ? Math.ceil((sY/sA)*100) : 0;
            document.getElementById('attainment-pct').innerText = pct + "%";
            document.getElementById('attainment-bar').style.width = Math.min(pct, 100) + "%";

            const tbody = document.getElementById('dealer-list');
            tbody.innerHTML = '';
            
            Object.entries(dMap).sort((a,b) => b[1].y - a[1].y).forEach(([n, d], idx) => {
                // 실적이 전혀 없으면 표출 안함
                if(d.y === 0 && d.m === 0 && d.m_ly === 0 && d.a === 0) return;

                const dPct = d.a > 0 ? Math.ceil((d.y/d.a)*100) : 0;
                const detailId = `detail-${idx}`;
                
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 cursor-pointer" onclick="toggleRow('${detailId}')">
                        <td class="px-10 py-5 text-slate-700 font-bold flex items-center gap-2"><span class="text-blue-500 bg-blue-50 rounded w-4 h-4 flex items-center justify-center text-[10px]">+</span> ${n}</td>
                        <td class="px-6 py-5 text-right text-slate-400 bg-slate-50/30">${Math.ceil(d.m_ly).toLocaleString()}</td>
                        <td class="px-6 py-5 text-right text-slate-700 font-bold">${Math.ceil(d.m).toLocaleString()}</td>
                        <td class="px-6 py-5 text-right text-xs tracking-tight">${getYoYHTML(d.m, d.m_ly)}</td>
                        <td class="px-8 py-5 text-right bg-slate-50/50 bstk-red font-black text-base border-l border-slate-100">${Math.ceil(d.y).toLocaleString()}</td>
                        <td class="px-8 py-5 text-right font-black ${dPct >= 100 ? 'text-emerald-600' : 'text-slate-500'}">${dPct}%</td>
                    </tr>
                    <tr id="${detailId}" class="hidden bg-slate-50/50">
                        <td colspan="6" class="px-10 py-4"><div class="bg-white rounded-xl border border-slate-200 p-4 shadow-sm"><table class="w-full text-xs text-left"><thead><tr class="text-slate-400 border-b border-slate-100"><th class="pb-2">상세 규격 & 패턴</th><th class="pb-2 text-right">당월 판매</th><th class="pb-2 text-right">누적 판매</th></tr></thead><tbody class="divide-y divide-slate-50">${d.details.map(det => `<tr><td class="py-2"><strong>${det.s}</strong> <span class="text-slate-400">${det.p}</span></td><td class="py-2 text-right">${Math.ceil(det.m).toLocaleString()}</td><td class="py-2 text-right bstk-red font-bold">${Math.ceil(det.y).toLocaleString()}</td></tr>`).join('')}</tbody></table></div></td></tr>`;
            });
        }
        window.onload = init;
    </script>
</body>
</html>
