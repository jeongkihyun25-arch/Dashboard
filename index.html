<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSTK 17.5" LSR 통합 분석 대시보드</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; background-color: #f8fafc; }
        .bstk-red { color: #E30613; }
        .bg-bstk-red { background-color: #E30613; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04); }
        .truncate-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* 탭 버튼 트랜지션 */
        .filter-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .filter-active { background-color: #1e293b; color: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .filter-inactive { background-color: white; color: #64748b; border: 1px solid #e2e8f0; }
        .filter-inactive:hover { background-color: #f1f5f9; color: #0f172a; }
    </style>
</head>
<body class="text-slate-900 antialiased overflow-x-hidden">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-bstk-red text-white font-black px-3 py-1 rounded-lg text-sm italic shadow-md">BSTK</div>
                <h1 class="text-lg sm:text-xl font-black text-slate-800 tracking-tight">17.5" LSR 통합 성과 대시보드</h1>
            </div>
            <div class="flex flex-col items-end">
                <div class="flex items-center gap-2">
                    <span id="status-dot" class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></span>
                    <span id="status-text" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Loading Data...</span>
                </div>
                <div id="month-indicator" class="text-[11px] text-slate-400 font-bold mt-1 uppercase">2026 분석 준비중</div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        
        <div class="bg-white p-5 rounded-[2rem] card-shadow border border-slate-100 mb-8 flex flex-col md:flex-row gap-6 items-start md:items-center justify-between">
            <div class="flex items-center gap-4 w-full md:w-auto overflow-x-auto pb-2 md:pb-0">
                <span class="text-xs font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">사이즈 필터</span>
                <div class="flex gap-2">
                    <button onclick="setFilter('size', 'ALL')" id="sz-ALL" class="filter-btn filter-active px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap">전체 17.5"</button>
                    <button onclick="setFilter('size', '205')" id="sz-205" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap">205</button>
                    <button onclick="setFilter('size', '215')" id="sz-215" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap">215</button>
                    <button onclick="setFilter('size', '225')" id="sz-225" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap">225</button>
                </div>
            </div>
            <div class="hidden md:block w-[1px] h-10 bg-slate-200"></div>
            <div class="flex items-center gap-4 w-full md:w-auto overflow-x-auto pb-2 md:pb-0">
                <span class="text-xs font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">패턴 필터</span>
                <div class="flex gap-2">
                    <button onclick="setFilter('pattern', 'ALL')" id="pt-ALL" class="filter-btn filter-active px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap">전체 패턴</button>
                    <button onclick="setFilter('pattern', 'RS002')" id="pt-RS002" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap">RS002 (Steer)</button>
                    <button onclick="setFilter('pattern', 'RD002')" id="pt-RD002" class="filter-btn filter-inactive px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap">RD002 (Drive)</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-8 rounded-[2rem] card-shadow border border-slate-100">
                <p class="text-[11px] font-bold text-slate-400 uppercase mb-3">조건별 누적 실적 (2026 YTD)</p>
                <div class="flex items-baseline gap-2 mb-6">
                    <span id="ytd-val" class="text-5xl lg:text-6xl font-black tracking-tighter">0</span>
                    <span class="text-slate-300 font-bold text-xl">본</span>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 mb-1">작년 동기 대비</p>
                        <p id="ytd-vs-ly" class="text-sm font-black">-</p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 mb-1">5년 평균 대비</p>
                        <p id="ytd-vs-avg" class="text-sm font-black">-</p>
                    </div>
                </div>
            </div>

            <div class="bg-white p-8 rounded-[2rem] card-shadow border border-slate-100 border-t-4 border-t-red-500">
                <p id="month-label" class="text-[11px] font-bold text-slate-400 uppercase mb-3">당월 실적</p>
                <div class="flex items-baseline gap-2 mb-6 bstk-red">
                    <span id="month-val" class="text-5xl lg:text-6xl font-black tracking-tighter">0</span>
                    <span class="text-slate-300 font-bold text-xl">본</span>
                </div>
                <p class="text-xs font-bold text-slate-400 mt-6">선택된 패턴/사이즈 기준 당월 판매량</p>
            </div>

            <div class="bg-slate-900 p-8 rounded-[2rem] card-shadow text-white relative">
                <p class="text-[11px] font-bold text-slate-400 uppercase mb-3">5년 평균 도달률 (YTD 기준)</p>
                <div id="attainment-pct" class="text-5xl lg:text-6xl font-black tracking-tighter mb-4 text-white">0%</div>
                <div class="w-full bg-slate-700 h-2.5 rounded-full overflow-hidden mb-2">
                    <div id="attainment-bar" class="bg-emerald-400 h-full transition-all duration-700" style="width: 0%"></div>
                </div>
                <p id="attainment-msg" class="text-[10px] font-bold text-slate-400 text-right uppercase tracking-wider">Target Analysis</p>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] card-shadow border border-slate-100 overflow-hidden">
            <div class="px-6 sm:px-10 py-6 border-b border-slate-50 bg-slate-50/70 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
                <h3 class="font-black text-slate-800 text-lg">대리점별 세부 실적 분석</h3>
                <div class="flex gap-2">
                    <span class="text-[10px] font-bold text-slate-500 bg-white px-3 py-1.5 rounded-lg border border-slate-200 uppercase shadow-sm">자동 정렬: 누적 판매(YTD) 순</span>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left whitespace-nowrap min-w-[800px]">
                    <thead>
                        <tr class="bg-white text-[11px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                            <th class="px-6 sm:px-10 py-5">대리점명</th>
                            <th class="px-6 py-5 text-right">당월 실적</th>
                            <th class="px-6 py-5 text-right bg-slate-50/50 text-slate-900">2026 누적(YTD)</th>
                            <th class="px-6 py-5 text-right">작년(25년) 동기</th>
                            <th class="px-6 py-5 text-right">전년비(YoY)</th>
                            <th class="px-6 sm:px-10 py-5 text-right">5년평균 대비</th>
                        </tr>
                    </thead>
                    <tbody id="dealer-list" class="divide-y divide-slate-50 text-sm font-bold">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // 1. 설정
        const GITHUB_USER = "jeongkihyun25-arch";
        const REPO_NAME = "Dashboard";
        const t = new Date().getTime();
        const URL_HIST = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/historical_data.xlsx?t=${t}`;
        const URL_CURR = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/current_sales.xls?t=${t}`;

        // 2. 전역 상태 변수
        let rawCurrent = [];
        let rawHistory = [];
        let filterSize = 'ALL';
        let filterPattern = 'ALL';
        let currentMonthNum = 1;

        // 3. 텍스트 정규화 유틸리티
        const is175 = (str) => String(str || '').replace(/[^0-9]/g, '').includes('175');
        
        const matchSize = (rowSize, fSize) => {
            if(fSize === 'ALL') return true;
            return String(rowSize).includes(fSize);
        };

        const matchPattern = (rowPttn, fPttn) => {
            if(fPttn === 'ALL') return true;
            const p = String(rowPttn).toUpperCase().replace(/[^A-Z0-9]/g, '');
            if(fPttn === 'RS002') return p.includes('RS002') || p.includes('RSTEER');
            if(fPttn === 'RD002') return p.includes('RD002') || p.includes('RDRIVE');
            return true;
        };

        // 4. 데이터 로드
        async function fetchRaw(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error("Load Fail");
            const ab = await res.arrayBuffer();
            const wb = XLSX.read(new Uint8Array(ab), {type: 'array'});
            return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
        }

        async function init() {
            try {
                currentMonthNum = new Date().getMonth() + 1;
                document.getElementById('month-label').innerText = `당월 실적 (${currentMonthNum}월)`;
                document.getElementById('month-indicator').innerText = `2026.01 - ${currentMonthNum}월 누계`;

                const [hRows, cRows] = await Promise.all([fetchRaw(URL_HIST), fetchRaw(URL_CURR)]);

                // 배열(행렬) 데이터를 오브젝트 형태로 안전하게 변환
                rawCurrent = processExcelArray(cRows, 'current');
                rawHistory = processExcelArray(hRows, 'history');

                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-emerald-500";
                document.getElementById('status-text').innerText = "Live Synced";

                // 최초 전체 렌더링
                renderDashboard();

            } catch (e) {
                console.error(e);
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-red-500";
                document.getElementById('status-text').innerText = "Sync Error";
            }
        }

        // 엑셀 배열 -> 오브젝트 변환기 (컬럼명 흔들림 완벽 방어)
        function processExcelArray(rows, type) {
            const result = [];
            if(rows.length < 2) return result;
            
            const headers = rows[0].map(h => String(h||'').toUpperCase().replace(/\s/g, ''));
            
            const idxDealer = headers.findIndex(h => h.includes('거래처'));
            const idxSize = headers.findIndex(h => h.includes('SIZE') || h.includes('사이즈'));
            const idxPttn = headers.findIndex(h => h.includes('PTTN') || h.includes('패턴'));
            
            if(type === 'current') {
                const idxYTD = headers.findIndex(h => h.includes('합계수량') || h.includes('누적'));
                // 당월 찾기 (마지막 QTY)
                let idxMth = -1;
                for(let i = headers.length-1; i>=0; i--) { if(headers[i].includes('QTY')){ idxMth = i; break; } }

                for(let i=1; i<rows.length; i++) {
                    const r = rows[i];
                    if(!r || !is175(r[idxSize])) continue;
                    result.push({
                        dealer: String(r[idxDealer]||'기타').trim(),
                        size: String(r[idxSize]||''),
                        pattern: String(r[idxPttn]||''),
                        ytd: parseFloat(String(r[idxYTD]||'0').replace(/,/g,'')) || 0,
                        month: parseFloat(String(r[idxMth]||'0').replace(/,/g,'')) || 0
                    });
                }
            } else if (type === 'history') {
                const idx2025 = headers.findIndex(h => h.includes('2025'));
                const idxAvg = headers.findIndex(h => h.includes('5년평균'));
                
                for(let i=1; i<rows.length; i++) {
                    const r = rows[i];
                    if(!r || !is175(r[idxSize])) continue;
                    result.push({
                        dealer: String(r[idxDealer]||'기타').trim(),
                        size: String(r[idxSize]||''),
                        pattern: String(r[idxPttn]||''),
                        val25: parseFloat(String(r[idx2025]||'0').replace(/,/g,'')) || 0,
                        valAvg: parseFloat(String(r[idxAvg]||'0').replace(/,/g,'')) || 0
                    });
                }
            }
            return result;
        }

        // 5. 버튼 클릭 시 필터 변경 로직
        window.setFilter = function(type, val) {
            if(type === 'size') {
                filterSize = val;
                ['ALL','205','215','225'].forEach(s => {
                    const btn = document.getElementById(`sz-${s}`);
                    btn.className = (s === val) ? 'filter-btn filter-active px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap' : 'filter-btn filter-inactive px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap';
                });
            } else if(type === 'pattern') {
                filterPattern = val;
                ['ALL','RS002','RD002'].forEach(p => {
                    const btn = document.getElementById(`pt-${p}`);
                    btn.className = (p === val) ? 'filter-btn filter-active px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap' : 'filter-btn filter-inactive px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap';
                });
            }
            renderDashboard(); // 필터 적용 후 리렌더링
        }

        // 포맷터 유틸
        const formatGrowth = (cur, tgt) => {
            if(tgt <= 0) return `<span class="text-slate-400">데이터 없음</span>`;
            const pct = ((cur / tgt) - 1) * 100;
            if(pct > 0) return `<span class="text-emerald-600">+${pct.toFixed(1)}% ▲</span>`;
            if(pct < 0) return `<span class="text-rose-600">${pct.toFixed(1)}% ▼</span>`;
            return `<span class="text-slate-500">동일 -</span>`;
        };

        const formatAttainment = (cur, tgt) => {
            if(tgt <= 0) return `<span class="text-slate-400">-</span>`;
            const pct = Math.round((cur / tgt) * 100);
            return `<span class="${pct >= 100 ? 'text-emerald-600' : 'text-slate-600'}">${pct}%</span>`;
        };

        // 6. 핵심 렌더링 로직 (데이터 계산 및 UI 그리기)
        function renderDashboard() {
            // 필터링 적용
            const curData = rawCurrent.filter(r => matchSize(r.size, filterSize) && matchPattern(r.pattern, filterPattern));
            const hisData = rawHistory.filter(r => matchSize(r.size, filterSize) && matchPattern(r.pattern, filterPattern));

            let sumYTD = 0, sumMonth = 0;
            let sum25YTD = 0, sumAvgYTD = 0;
            const dealerMap = {};

            // 당해년도(2026) 누적
            curData.forEach(r => {
                sumYTD += r.ytd;
                sumMonth += r.month;
                if(!dealerMap[r.dealer]) dealerMap[r.dealer] = { ytd:0, m:0, ytd25:0, ytdAvg:0 };
                dealerMap[r.dealer].ytd += r.ytd;
                dealerMap[r.dealer].m += r.month;
            });

            // 과거 데이터 (현재 월 기준 YTD 환산)
            hisData.forEach(r => {
                const target25 = (r.val25 / 12) * currentMonthNum;
                const targetAvg = (r.valAvg / 12) * currentMonthNum;
                
                sum25YTD += target25;
                sumAvgYTD += targetAvg;

                if(dealerMap[r.dealer]) { // 현재 매출이 있는 대리점만 합산
                    dealerMap[r.dealer].ytd25 += target25;
                    dealerMap[r.dealer].ytdAvg += targetAvg;
                }
            });

            // KPI 업데이트
            document.getElementById('ytd-val').innerText = sumYTD.toLocaleString();
            document.getElementById('month-val').innerText = sumMonth.toLocaleString();
            
            document.getElementById('ytd-vs-ly').innerHTML = formatGrowth(sumYTD, sum25YTD);
            document.getElementById('ytd-vs-avg').innerHTML = formatGrowth(sumYTD, sumAvgYTD);

            const attTotal = sumAvgYTD > 0 ? Math.round((sumYTD / sumAvgYTD) * 100) : 0;
            document.getElementById('attainment-pct').innerText = attTotal + "%";
            document.getElementById('attainment-bar').style.width = Math.min(attTotal, 100) + "%";
            document.getElementById('attainment-bar').className = attTotal >= 100 ? "bg-emerald-400 h-full transition-all duration-700" : "bg-blue-400 h-full transition-all duration-700";

            // 테이블 렌더링 (YTD 기준 내림차순 정렬)
            const tbody = document.getElementById('dealer-list');
            tbody.innerHTML = '';

            const sortedDealers = Object.entries(dealerMap).sort((a,b) => b[1].ytd - a[1].ytd);
            
            if(sortedDealers.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-10 text-center text-slate-400">조건에 맞는 데이터가 없습니다.</td></tr>`;
                return;
            }

            sortedDealers.forEach(([name, d]) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 sm:px-10 py-5 font-black text-slate-700 truncate-text max-w-[200px]">${name}</td>
                        <td class="px-6 py-5 text-right text-slate-500">${d.m.toLocaleString()}</td>
                        <td class="px-6 py-5 text-right bg-slate-50/50 text-bstk-red font-black text-base">${d.ytd.toLocaleString()}</td>
                        <td class="px-6 py-5 text-right text-slate-400 text-xs">${Math.round(d.ytd25).toLocaleString()}</td>
                        <td class="px-6 py-5 text-right font-bold tracking-tight">${formatGrowth(d.ytd, d.ytd25)}</td>
                        <td class="px-6 sm:px-10 py-5 text-right font-black text-base">${formatAttainment(d.ytd, d.ytdAvg)}</td>
                    </tr>`;
            });
        }

        window.onload = init;
    </script>
</body>
</html>
