<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSTK Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; background:#f8fafc; }
.red { color:#E30613; }
.active { background:#1e293b; color:white; }
.inactive { background:white; color:#64748b; border:1px solid #e2e8f0; }
</style>
</head>

<body class="p-6">

<h1 class="text-xl font-bold mb-4">17.5인치 실적</h1>

<select id="month" onchange="changeMonth()" class="border p-2 mb-4"></select>

<div class="mb-4">
<button onclick="setFilter('ALL')" id="f-ALL" class="active px-3 py-1">전체</button>
<button onclick="setFilter('205')" id="f-205" class="inactive px-3 py-1">205</button>
<button onclick="setFilter('215')" id="f-215" class="inactive px-3 py-1">215</button>
<button onclick="setFilter('225')" id="f-225" class="inactive px-3 py-1">225</button>
</div>

<div class="grid grid-cols-3 gap-4 mb-6">
<div><p>누계</p><div id="ytd" class="text-3xl red">0</div></div>
<div><p>당월</p><div id="monthVal" class="text-3xl">0</div></div>
<div><p>딜러수</p><div id="cnt" class="text-3xl">0</div></div>
</div>

<table class="w-full text-sm">
<thead>
<tr>
<th class="text-left">딜러</th>
<th class="text-right">당월</th>
<th class="text-right">누계</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

<script>

const URL = "https://raw.githubusercontent.com/jeongkihyun25-arch/Dashboard/main/current_sales.xls?t=" + Date.now();

let raw = [];
let filter = 'ALL';
let selectedMonth = null;
let availableMonths = [];

async function load(){

    const res = await fetch(URL);
    const ab = await res.arrayBuffer();
    const wb = XLSX.read(new Uint8Array(ab), {type:'array'});
    const sheet = wb.Sheets[wb.SheetNames[0]];

    const rows = XLSX.utils.sheet_to_json(sheet,{header:1});
    const header = rows[0].map(v=>String(v||'').trim());

    const idxDealer = header.findIndex(v=>v.includes('거래처')||v.includes('딜러'));
    const idxSize = header.findIndex(v=>v.includes('SIZE')||v.includes('사이즈'));

    // 🔥 월 자동 탐색
    const monthCols = {};

    header.forEach((v,i)=>{
        const txt = String(v).replace(/\s+/g,'');
        const match = txt.match(/2026[-\/]?(\d{1,2})/);

        if(match){
            const m = parseInt(match[1]);

            if(
                txt.includes('QTY') ||
                txt.includes('수량') ||
                txt.includes('판매')
            ){
                monthCols[m] = i;
            }
        }
    });

    availableMonths = Object.keys(monthCols).map(Number).sort((a,b)=>a-b);

    // 👉 최신 월 자동 선택
    selectedMonth = Math.max(...availableMonths);

    raw = [];

    for(let i=1;i<rows.length;i++){
        const r = rows[i];
        if(!r) continue;

        const size = String(r[idxSize]||'');
        if(size.includes('235')) continue;

        const dealer = String(r[idxDealer]||'기타');

        let y = 0;
        const monthly = {};

        availableMonths.forEach(m=>{
            let val = parseFloat(String(r[monthCols[m]]||'0').replace(/,/g,''))||0;

            // 🔥 마이너스 제거
            if(val < 0) val = 0;

            monthly[m] = val;
            y += val;
        });

        if(y <= 0) continue;

        raw.push({dealer,size,monthly,y});
    }

    initMonth();
    render();
}

function initMonth(){
    const sel = document.getElementById('month');
    sel.innerHTML='';

    availableMonths.forEach(m=>{
        const o=document.createElement('option');
        o.value=m;
        o.textContent=m+'월';
        if(m===selectedMonth) o.selected=true;
        sel.appendChild(o);
    });
}

function changeMonth(){
    selectedMonth = parseInt(document.getElementById('month').value);
    render();
}

function setFilter(v){
    filter = v;

    ['ALL','205','215','225'].forEach(x=>{
        document.getElementById('f-'+x).className =
        x===v ? 'active px-3 py-1' : 'inactive px-3 py-1';
    });

    render();
}

function render(){

    const data = raw.filter(d=>{
        return filter==='ALL' || d.size.includes(filter);
    });

    let totalY=0,totalM=0;
    const map={};

    data.forEach(d=>{
        const mVal = d.monthly[selectedMonth]||0;

        totalY += d.y;
        totalM += mVal;

        if(!map[d.dealer]) map[d.dealer]={y:0,m:0};

        map[d.dealer].y += d.y;
        map[d.dealer].m += mVal;
    });

    document.getElementById('ytd').innerText = Math.round(totalY).toLocaleString();
    document.getElementById('monthVal').innerText = Math.round(totalM).toLocaleString();
    document.getElementById('cnt').innerText = Object.keys(map).length;

    const tbody = document.getElementById('list');
    tbody.innerHTML='';

    Object.entries(map)
    .sort((a,b)=>b[1].y-b[1].y)
    .forEach(([name,val])=>{
        tbody.innerHTML += `
        <tr>
            <td>${name}</td>
            <td class="text-right">${Math.round(val.m).toLocaleString()}</td>
            <td class="text-right red font-bold">${Math.round(val.y).toLocaleString()}</td>
        </tr>`;
    });
}

load();

</script>

</body>
</html>
