<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSTK 17.5" LSR 모니터링</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; background-color: #f8fafc; }
        .bstk-red { color: #E30613; }
        .bg-bstk-red { background-color: #E30613; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04); }
    </style>
</head>
<body class="text-slate-900 antialiased">

    <header class="sticky top-0 z-50 bg-white border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-bstk-red text-white font-black px-3 py-1 rounded-lg text-sm italic shadow-md">BSTK</div>
                <h1 class="text-xl font-black text-slate-800 tracking-tight">17.5" LSR 워킹그룹 모니터링</h1>
            </div>
            <div id="status-bar" class="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-100">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></span>
                <span id="status-text" class="text-[10px] font-bold text-slate-500 uppercase">Connecting...</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
            <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100">
                <p class="text-[11px] font-bold text-slate-400 uppercase mb-3">2026 누적 실적 (YTD)</p>
                <div class="flex items-baseline gap-2 mb-6">
                    <span id="ytd-val" class="text-6xl font-black tracking-tighter">0</span>
                    <span class="text-slate-300 font-bold text-xl">본</span>
                </div>
                <div id="ytd-info" class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-lg w-fit">누계 데이터 분석 중</div>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-slate-100 border-t-4 border-t-red-500">
                <p id="month-label" class="text-[11px] font-bold text-slate-400 uppercase mb-3">당월 실적</p>
                <div class="flex items-baseline gap-2 mb-6 bstk-red">
                    <span id="month-val" class="text-6xl font-black tracking-tighter">0</span>
                    <span class="text-slate-300 font-bold text-xl">본</span>
                </div>
                <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                    <div id="month-bar" class="bg-bstk-red h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>

            <div class="bg-slate-900 p-8 rounded-[2.5rem] card-shadow text-white">
                <p class="text-[11px] font-bold text-slate-500 uppercase mb-3">5년 평균 누적 도달률</p>
                <div id="attainment-pct" class="text-6xl font-black tracking-tighter mb-4">0%</div>
                <div class="w-full bg-slate-800 h-2.5 rounded-full overflow-hidden">
                    <div id="attainment-bar" class="bg-white h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p id="attainment-msg" class="text-[10px] font-bold text-slate-400 mt-4 text-right italic uppercase">Historical Data vs YTD</p>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] card-shadow border border-slate-100 overflow-hidden">
            <div class="px-10 py-8 border-b border-slate-50 bg-slate-50/50">
                <h3 class="font-black text-slate-800 text-lg">대리점별 성과 리스트 (17.5" 전용)</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left whitespace-nowrap">
                    <thead>
                        <tr class="bg-white text-[11px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                            <th class="px-10 py-6">대리점명</th>
                            <th class="px-10 py-6 text-right">당월 판매</th>
                            <th class="px-10 py-6 text-right bg-slate-50/50 text-slate-900 font-black">2026 누적</th>
                            <th class="px-10 py-6 text-right">5년 평균비(%)</th>
                        </tr>
                    </thead>
                    <tbody id="dealer-list" class="divide-y divide-slate-50 text-sm font-bold"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const GITHUB_USER = "jeongkihyun25-arch";
        const REPO_NAME = "Dashboard";
        const URL_HIST = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/historical_data.xlsx`;
        const URL_CURR = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/current_sales.xlsx`;

        // 사이즈 텍스트 정규화 (공백/슬래시 무시하고 숫자만 추출하여 17.5인치 판단)
        const isTargetSize = (str) => String(str || '').replace(/[^0-9]/g, '').includes('175');

        async function fetchExcel(url) {
            const res = await fetch(url);
            const ab = await res.arrayBuffer();
            const wb = XLSX.read(new Uint8Array(ab), {type: 'array'});
            return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        }

        async function init() {
            try {
                const [hData, cData] = await Promise.all([fetchExcel(URL_HIST), fetchExcel(URL_CURR)]);
                
                const now = new Date();
                const nowMonth = now.getMonth() + 1;
                document.getElementById('month-label').innerText = `당월 실적 (${nowMonth}월)`;

                let totalYTD = 0, totalMonth = 0, totalAvgYTD = 0;
                const dealers = {};

                // 1. 현재 데이터 집계
                cData.forEach(row => {
                    if (isTargetSize(row.SIZE)) {
                        const name = row.거래처 || '기타';
                        const ytd = parseFloat(row['합계수량'] || 0);
                        
                        // QTY 컬럼들만 순서대로 추출하여 현재 월 데이터 찾기
                        const qtyKeys = Object.keys(row).filter(k => k.includes('QTY')).sort((a,b) => {
                            const numA = parseInt(a.replace(/[^0-9]/g, '') || 0);
                            const numB = parseInt(b.replace(/[^0-9]/g, '') || 0);
                            return numA - numB;
                        });
                        const mQty = parseFloat(row[qtyKeys[nowMonth - 1]] || 0);

                        totalYTD += ytd;
                        totalMonth += mQty;

                        if (!dealers[name]) dealers[name] = { ytd: 0, m: 0, hAvg: 0 };
                        dealers[name].ytd += ytd;
                        dealers[name].m += mQty;
                    }
                });

                // 2. 5년 평균 데이터 매칭 (대리점명 기준)
                hData.forEach(h => {
                    const dName = h.거래처명;
                    if (dealers[dName]) {
                        // 현재 월까지의 5년 평균 기대치 (누적비교를 위해 12개월분 중 N개월분 계산)
                        const currentAvgExpect = (parseFloat(h['5년평균'] || 0) / 12) * nowMonth;
                        dealers[dName].hAvg += currentAvgExpect;
                        totalAvgYTD += currentAvgExpect;
                    }
                });

                // 3. UI 렌더링
                document.getElementById('ytd-val').innerText = totalYTD.toLocaleString();
                document.getElementById('month-val').innerText = totalMonth.toLocaleString();
                document.getElementById('month-bar').style.width = (totalYTD > 0 ? (totalMonth / (totalYTD / nowMonth)) * 100 : 0) + "%";

                const attPct = totalAvgYTD > 0 ? Math.round((totalYTD / totalAvgYTD) * 100) : 0;
                document.getElementById('attainment-pct').innerText = attPct + "%";
                document.getElementById('attainment-bar').style.width = Math.min(attPct, 100) + "%";

                const list = document.getElementById('dealer-list');
                Object.entries(dealers).sort((a,b) => b[1].ytd - a[1].ytd).forEach(([name, d]) => {
                    const pct = d.hAvg > 0 ? Math.round((d.ytd / d.hAvg) * 100) : 0;
                    list.innerHTML += `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-10 py-6 font-bold text-slate-700">${name}</td>
                            <td class="px-10 py-6 text-right text-slate-400">${d.m.toLocaleString()}</td>
                            <td class="px-10 py-6 text-right bg-slate-50/30 bstk-red font-black text-base">${d.ytd.toLocaleString()}</td>
                            <td class="px-10 py-6 text-right font-black ${pct >= 100 ? 'text-emerald-600' : 'text-slate-400'}">${pct}%</td>
                        </tr>`;
                });

                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-emerald-500";
                document.getElementById('status-text').innerText = "LIVE CONNECTED";
            } catch (e) {
                console.error(e);
                document.getElementById('status-text').innerText = "DATA ERROR";
            }
        }
        window.onload = init;
    </script>
</body>
</html>
